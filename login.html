<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="入卷">
  <link rel="manifest" href="manifest.json">
  <title>入卷</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>📖</text></svg>">
  <script src="common.js?v=10"></script>
  <style>
    body {
      overflow-y: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: env(safe-area-inset-top, 0px) env(safe-area-inset-right, 0px) env(safe-area-inset-bottom, 0px) env(safe-area-inset-left, 0px);
    }

    .login-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    .login-card {
      background: var(--bg-glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 40px 32px;
      text-align: center;
    }

    .login-title {
      font-family: var(--font-display);
      font-size: 48px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 8px;
      margin-bottom: 6px;
      text-shadow: 0 0 40px rgba(201, 164, 76, 0.25);
    }

    .login-subtitle {
      font-family: var(--font-display);
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .login-form input {
      text-align: center;
      font-size: 15px;
      padding: 12px 16px;
    }

    .login-form input::placeholder {
      color: var(--text-muted);
    }

    .login-btn {
      font-family: var(--font-ui);
      font-size: 15px;
      font-weight: 600;
      padding: 12px 24px;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent), #d4b05c);
      color: #1a1510;
      transition: all var(--transition);
      margin-top: 8px;
    }

    .login-btn:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
    }

    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .login-error {
      font-family: var(--font-ui);
      font-size: 13px;
      color: var(--danger);
      min-height: 20px;
      margin-top: 4px;
    }

    .login-ornament {
      display: block;
      margin: 0 auto 20px;
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.6;
    }

    @media (max-width: 600px) {
      .login-card {
        padding: 32px 20px;
      }
      .login-title {
        font-size: 36px;
        letter-spacing: 6px;
      }
    }

    /* Guide overlay */
    .guide-overlay {
      position: fixed; inset: 0; z-index: 9000;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(6px);
      display: none; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.3s ease;
    }
    .guide-overlay.visible { opacity: 1; }
    .guide-box {
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); max-width: 480px; width: 90%;
      box-shadow: var(--shadow); overflow: hidden;
    }
    .guide-header {
      padding: 20px 24px 12px; text-align: center;
    }
    .guide-header h2 {
      font-family: var(--font-display); font-size: 22px; font-weight: 700;
      color: var(--accent); letter-spacing: 3px; margin-bottom: 4px;
    }
    .guide-header p {
      font-size: 12px; color: var(--text-muted); letter-spacing: 1px;
    }
    .guide-body {
      padding: 8px 24px 20px;
    }
    .guide-step {
      display: flex; gap: 14px; padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .guide-step:last-child { border-bottom: none; }
    .guide-num {
      flex-shrink: 0; width: 24px; height: 24px; margin-top: 1px;
      border-radius: 50%; background: var(--accent-dim); border: 1px solid var(--accent);
      color: var(--accent); font-size: 12px; font-weight: 600;
      display: flex; align-items: center; justify-content: center;
    }
    .guide-text {
      font-size: 13.5px; line-height: 1.7; color: var(--text-secondary);
    }
    .guide-text strong { color: var(--text-primary); font-weight: 600; }
    .guide-text .guide-example {
      display: block; margin-top: 6px; padding: 6px 10px;
      background: var(--bg-elevated); border-radius: var(--radius);
      color: var(--text-muted); font-size: 12.5px; font-style: italic;
    }
    .guide-footer {
      padding: 14px 24px; border-top: 1px solid var(--border);
      display: flex; justify-content: center;
    }
  </style>
</head>
<body>

<div class="login-container">
  <div class="login-card">
    <span class="login-ornament"></span>
    <h1 class="login-title">入卷</h1>
    <p class="login-subtitle">AI 互动小说</p>

    <div class="login-form">
      <input type="text" id="username" placeholder="你的名字" autocomplete="off" autofocus>
      <input type="text" id="inviteCode" placeholder="邀请码（新用户需要填写）" autocomplete="off">
      <button class="login-btn" id="loginBtn" onclick="doLogin()">进入</button>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>
</div>

<div class="guide-overlay" id="guideOverlay">
  <div class="guide-box">
    <div class="guide-header">
      <h2>入卷指南</h2>
      <p>AI 互动小说</p>
    </div>
    <div class="guide-body">
      <div class="guide-step">
        <span class="guide-num">1</span>
        <div class="guide-text">
          <strong>新建故事</strong>后，先和 AI 聊聊你想要的世界。可以详细描述，也可以一句话概括，AI 会帮你完善。
          <span class="guide-example">"帮我做一个修仙流、废柴逆袭的世界观，第三人称视角"</span>
        </div>
      </div>
      <div class="guide-step">
        <span class="guide-num">2</span>
        <div class="guide-text">
          讨论完毕后，AI 会花约 <strong>1-2 分钟</strong>生成世界观和状态栏。在右侧预览，满意后点击<strong>「确认」</strong>即可开始游玩。
        </div>
      </div>
      <div class="guide-step">
        <span class="guide-num">3</span>
        <div class="guide-text">
          游玩中，AI 每轮会输出故事、更新状态栏，并给出 <strong>4 个选项</strong>。请等选项全部出现后再操作。点击右上角可随时查看状态栏。
        </div>
      </div>
    </div>
    <div class="guide-footer">
      <button class="login-btn" onclick="dismissGuide()" style="min-width:160px">知道了</button>
    </div>
  </div>
</div>

<script>
  function showGuide() {
    const el = document.getElementById('guideOverlay');
    el.style.display = 'flex';
    requestAnimationFrame(() => el.classList.add('visible'));
  }

  function dismissGuide() {
    localStorage.setItem('airp_guide_shown', '1');
    const el = document.getElementById('guideOverlay');
    el.classList.remove('visible');
    setTimeout(() => location.href = 'index.html?v=10', 300);
  }
</script>

<script>
  // If already logged in, redirect
  (async function checkAuth() {
    const token = Storage.getAuthToken();
    if (token) {
      try {
        const res = await fetch('/api/auth/me', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        if (data.ok) {
          location.href = 'index.html?v=10';
          return;
        }
      } catch {}
      // Token invalid, clear it
      Storage.clearAuthToken();
    }
  })();

  // Handle Enter key
  document.getElementById('username').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('inviteCode').focus();
  });
  document.getElementById('inviteCode').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const inviteCode = document.getElementById('inviteCode').value.trim();
    const username = document.getElementById('username').value.trim();
    const errorEl = document.getElementById('loginError');
    const btn = document.getElementById('loginBtn');

    errorEl.textContent = '';

    if (!username) {
      errorEl.textContent = '请输入你的名字';
      document.getElementById('username').focus();
      return;
    }

    btn.disabled = true;
    btn.textContent = '...';

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ inviteCode, username }),
      });
      const data = await res.json();

      if (data.ok && data.token) {
        Storage.setAuthToken(data.token);
        if (!localStorage.getItem('airp_guide_shown')) {
          showGuide();
        } else {
          location.href = 'index.html?v=10';
        }
      } else {
        errorEl.textContent = data.error || '登录失败';
        btn.disabled = false;
        btn.textContent = '进入';
      }
    } catch (e) {
      errorEl.textContent = '网络错误';
      btn.disabled = false;
      btn.textContent = '进入';
    }
  }
</script>

</body>
</html>
