function markMvuFieldsChanged(fields) {
  if (!conversation?.mvu) return;
  conversation.mvu._changedFields = [...new Set((fields || []).filter(Boolean))];
}

function handleMvuFieldInput(field, type, value) {
  if (!conversation?.mvu?.state || !(field in conversation.mvu.state)) return;
  let nextValue = value;
  if (type === 'number' || type === 'bar') {
    const parsed = Number(value);
    nextValue = Number.isFinite(parsed) ? parsed : 0;
  }
  conversation.mvu.state[field] = nextValue;
  markMvuFieldsChanged([field]);
  syncMvuHtmlWithState();
  Storage.saveConversation(conversation);
  renderMvuSidebar();
}

function handleMvuListItemInput(field, index, value) {
  if (!Array.isArray(conversation?.mvu?.state?.[field])) return;
  const oldValue = conversation.mvu.state[field][index];
  let nextValue = value;
  if (oldValue && typeof oldValue === 'object') {
    try { nextValue = JSON.parse(value); } catch { nextValue = value; }
  }
  conversation.mvu.state[field][index] = nextValue;
  markMvuFieldsChanged([field]);
  syncMvuHtmlWithState();
  Storage.saveConversation(conversation);
  renderMvuSidebar();
}

function addMvuListItem(field) {
  if (!Array.isArray(conversation?.mvu?.state?.[field])) return;
  const list = conversation.mvu.state[field];
  const sample = list.find(item => item && typeof item === 'object');
  if (sample) {
    const next = {};
    for (const [key, value] of Object.entries(sample)) {
      if (key === 'id') next[key] = `${field}_${Date.now()}`;
      else if (typeof value === 'number') next[key] = 0;
      else next[key] = '';
    }
    list.push(next);
  } else {
    list.push('');
  }
  markMvuFieldsChanged([field]);
  syncMvuHtmlWithState();
  Storage.saveConversation(conversation);
  renderMvuSidebar();
}

function removeMvuListItem(field, index) {
  if (!Array.isArray(conversation?.mvu?.state?.[field])) return;
  conversation.mvu.state[field].splice(index, 1);
  markMvuFieldsChanged([field]);
  syncMvuHtmlWithState();
  Storage.saveConversation(conversation);
  renderMvuSidebar();
}

function migrateMvuExpandableCollections() {
  const mvu = conversation?.mvu;
  if (!mvu?.state || !mvu?.schema) return false;
  let changed = false;
  const state = mvu.state;
  const schema = mvu.schema;

  if (state.main_quest && !Array.isArray(state.main_quests)) {
    schema.main_quests = schema.main_quests || {
      type: 'list',
      label: '主线任务',
      group: '任务',
      rule: '新增主线阶段时追加对象；推进、完成或失败时更新对应对象，不要覆盖其他任务',
    };
    state.main_quests = [{
      id: 'main_quest_1',
      title: '主线任务',
      status: '进行中',
      objective: String(state.main_quest || ''),
      progress: String(state.main_quest || ''),
      notes: '',
    }];
    changed = true;
  }

  const legacyCharacterFields = Object.keys(state).filter(key => /_(name|profile|outfit|affection|relation|personality|attitude|thoughts|location|status|role|identity|desc|description|note)$/.test(key));
  const profileFields = Object.keys(state).filter(key => /_profile$/.test(key));
  if ((profileFields.length || legacyCharacterFields.length) && !Array.isArray(state.characters)) {
    schema.characters = schema.characters || {
      type: 'list',
      label: '角色档案',
      group: '角色',
      rule: '遇到新角色时追加对象；角色关系、状态、位置或想法变化时更新对应对象，不要把多个角色合并到一个档案',
    };
    state.characters = profileFields.map(field => {
      const id = field.replace(/_profile$/, '');
      const profile = String(state[field] || '');
      const name = profile.split(/\n|，|,|：|:/).map(s => s.trim()).find(Boolean) || id;
      return {
        id,
        name,
        profile,
        outfit: state[`${id}_outfit`] || '',
        affection: state[`${id}_affection`] ?? '',
        relation: state[`${id}_relation`] || '',
        personality: state[`${id}_personality`] || '',
        attitude: state[`${id}_attitude`] || '',
        thoughts: state[`${id}_thoughts`] || '',
        location: state[`${id}_location`] || '',
      };
    });
    changed = true;
  }

  if (Array.isArray(state.characters)) {
    schema.characters = schema.characters || {
      type: 'list',
      label: '角色档案',
      group: '角色',
      rule: '遇到新角色时追加对象；角色关系、状态、位置或想法变化时更新对应对象，不要把多个角色合并到一个档案',
    };
    const before = JSON.stringify(state.characters);
    state.characters = normalizeMvuCharacters(state.characters, state, schema);
    if (JSON.stringify(state.characters) !== before) changed = true;
  }

  return changed;
}

function normalizeMvuCharacters(characters, state, schema) {
  const knownKeys = ['name', 'profile', 'outfit', 'affection', 'relation', 'personality', 'attitude', 'thoughts', 'location', 'status', 'role', 'identity', 'desc', 'description', 'note'];
  const byId = new Map();
  const addCharacter = (id, data = {}) => {
    const safeId = String(id || data.id || data.name || `character_${byId.size + 1}`).trim();
    if (!safeId) return null;
    const current = byId.get(safeId) || { id: safeId };
    for (const [key, value] of Object.entries(data)) {
      if (value !== undefined && value !== null && value !== '') current[key] = value;
    }
    byId.set(safeId, current);
    return current;
  };

  for (const item of characters || []) {
    if (!item || typeof item !== 'object') {
      addCharacter('', { name: String(item || '') });
      continue;
    }
    const id = item.id || item.key || item.name || item.title || `character_${byId.size + 1}`;
    const normalized = { id: String(id) };
    for (const [key, value] of Object.entries(item)) {
      const prefixed = String(key).match(/^(.+)_(name|profile|outfit|affection|relation|personality|attitude|thoughts|location|status|role|identity|desc|description|note)$/);
      if (prefixed && String(id) === prefixed[1]) normalized[prefixed[2]] = value;
      else normalized[key] = value;
    }
    if (!normalized.name && normalized.title) normalized.name = normalized.title;
    addCharacter(normalized.id, normalized);
  }

  const legacyPattern = /^(.+)_(name|profile|outfit|affection|relation|personality|attitude|thoughts|location|status|role|identity|desc|description|note)$/;
  for (const [field, value] of Object.entries(state || {})) {
    const match = field.match(legacyPattern);
    if (!match) continue;
    const [, id, key] = match;
    addCharacter(id, { [key]: value });
  }

  const result = [...byId.values()].map((character, index) => {
    const id = character.id || `character_${index + 1}`;
    const cleaned = { id };
    for (const key of knownKeys) {
      const prefixedKey = `${id}_${key}`;
      if (character[key] !== undefined && character[key] !== null && character[key] !== '') cleaned[key] = character[key];
      else if (character[prefixedKey] !== undefined && character[prefixedKey] !== null && character[prefixedKey] !== '') cleaned[key] = character[prefixedKey];
    }
    if (!cleaned.name) cleaned.name = character.title || character.label || id;
    for (const [key, value] of Object.entries(character)) {
      if (key === 'id' || knownKeys.includes(key) || key.startsWith(`${id}_`)) continue;
      if (value !== undefined && value !== null && value !== '') cleaned[key] = value;
    }
    return cleaned;
  });

  for (const field of Object.keys(state || {})) {
    if (!legacyPattern.test(field)) continue;
    delete state[field];
    if (schema) delete schema[field];
  }

  return result;
}

function syncMvuHtmlWithState() {
  const mvu = conversation?.mvu;
  if (!mvu?.html) return false;

  const host = document.createElement('div');
  host.innerHTML = mvu.html;
  host.querySelectorAll('[data-auto-sync="1"]').forEach(el => el.remove());
  const nextHtml = host.innerHTML;
  if (nextHtml !== mvu.html) {
    mvu.html = nextHtml;
    return true;
  }
  return false;
}

function isInternalMvuField(field) {
  return /^(templates?|templateInstances|schema|html|css)$/i.test(field)
    || /^_/.test(field)
    || /(_template|_templates|_instances|_schema|_html|_css)$/i.test(field);
}

function getMvuBoundFields(html) {
  return getMvuBindingSets(html).all;
}

function getMvuBindingSets(html) {
  const host = document.createElement('div');
  host.innerHTML = html || '';
  const direct = new Set();
  const list = new Set();
  const bar = new Set();
  host.querySelectorAll('[data-field]').forEach(el => direct.add(el.dataset.field));
  host.querySelectorAll('[data-field-list]').forEach(el => list.add(el.dataset.fieldList));
  host.querySelectorAll('[data-field-bar]').forEach(el => bar.add(el.dataset.fieldBar));
  return { direct, list, bar, all: new Set([...direct, ...list, ...bar]) };
}

function getUnboundMvuFields(fields = null) {
  const mvu = conversation?.mvu;
  if (!mvu?.state || !mvu?.html) return [];
  const bindings = getMvuBindingSets(mvu.html);
  const targets = Array.isArray(fields) && fields.length ? fields : Object.keys(mvu.state);
  return [...new Set(targets)]
    .filter(field => field in mvu.state)
    .filter(field => {
      if (isInternalMvuField(field)) return false;
      const value = mvu.state[field];
      if (Array.isArray(value)) return !bindings.list.has(field);
      return !bindings.all.has(field);
    });
}

function getMvuFieldDisplayGroup(field, def = {}, value) {
  const haystack = `${field} ${def.label || ''} ${def.group || ''}`.toLowerCase();
  if (/main_quests|main_quest|主线/.test(haystack)) return { key: 'quests-main', title: '主线任务', hint: '当前主线推进' };
  if (/side_quests|side_quest|支线/.test(haystack)) return { key: 'quests-side', title: '支线任务', hint: '支线与委托' };
  if (/quest|task|任务|委托|目标/.test(haystack)) return { key: 'quests', title: '任务记录', hint: '当前目标' };
  if (/characters|character|npc|profile|role|角色|人物|关系/.test(haystack)) return { key: 'characters', title: '角色档案', hint: '人物关系与状态' };
  if (/inventory|items|item|bag|weapon|armor|equipment|物品|道具|装备|背包/.test(haystack)) return { key: 'items', title: '物品行囊', hint: '道具与装备' };
  if (/skill|ability|spell|talent|技能|法术|功法|天赋/.test(haystack)) return { key: 'skills', title: '能力技艺', hint: '技能与成长' };
  if (/location|place|map|world|time|weather|地点|位置|地图|世界|时间|天气/.test(haystack)) return { key: 'world', title: '世界状态', hint: '环境与位置' };
  if (def.type === 'bar' || typeof value === 'number') return { key: 'status', title: '状态概览', hint: '数值状态' };
  return { key: 'notes', title: '状态记录', hint: '补充信息' };
}

function createMvuManagedFieldHtml(field, def = {}, value) {
  const type = def.type || (Array.isArray(value) ? 'list' : typeof value === 'number' ? 'number' : 'text');
  const label = Utils.escapeHtml(def.label || field);
  const safeField = Utils.escapeHtml(field);
  if (type === 'list' || Array.isArray(value)) {
    const renderAs = field === 'characters' ? ' data-render-as="character-cards"' : '';
    return `<div class="mvu-field mvu-managed-field" data-mvu-detail data-mvu-title="${label}" data-mvu-field="${safeField}"><div class="mvu-label">${label}</div><div class="mvu-list" data-field-list="${safeField}"${renderAs}></div></div>`;
  }
  if (type === 'bar') {
    const max = Utils.escapeHtml(String(def.max || 100));
    return `<div class="mvu-field mvu-managed-field" data-mvu-detail data-mvu-title="${label}" data-mvu-field="${safeField}"><div class="mvu-label">${label}</div><div class="mvu-value" data-field="${safeField}"></div><div class="mvu-bar-track" aria-valuemax="${max}"><span class="mvu-bar-fill" data-field-bar="${safeField}"></span></div></div>`;
  }
  return `<div class="mvu-field mvu-managed-field" data-mvu-detail data-mvu-title="${label}" data-mvu-field="${safeField}"><div class="mvu-label">${label}</div><div class="mvu-value" data-field="${safeField}"></div></div>`;
}

function findMvuSemanticSection(host, key) {
  if (!host) return null;
  const managed = host.querySelector(`[data-mvu-managed-section="${key}"], [data-mvu-section="${key}"]`);
  if (managed) return managed;
  const list = key === 'characters' ? host.querySelector('[data-field-list="characters"]') : null;
  if (list) return list.closest('.mvu-section, details, section, article, .mvu-panel, div') || list;
  const labels = key === 'characters' ? ['角色档案', '角色', '人物关系'] : [];
  if (!labels.length) return null;
  const candidates = [...host.querySelectorAll('.mvu-section, details, section, article, .mvu-panel, div')]
    .filter(el => el !== host)
    .sort((a, b) => (a.textContent || '').length - (b.textContent || '').length);
  return candidates.find(el => labels.some(label => (el.textContent || '').includes(label))) || null;
}

function upgradeMvuSemanticSection(host, key, field, def, value) {
  const group = getMvuFieldDisplayGroup(field, def, value);
  const sections = [...host.querySelectorAll(`[data-mvu-managed-section="${key}"], [data-mvu-section="${key}"]`)];
  const found = findMvuSemanticSection(host, key);
  let section = found || sections[0];
  if (!section) return null;

  for (const duplicate of sections) {
    if (duplicate !== section && !duplicate.contains(section)) duplicate.remove();
  }

  section.classList.add('mvu-section', 'mvu-managed-section');
  section.dataset.mvuManagedSection = key;
  section.dataset.mvuSection = key;
  if (section.tagName === 'DETAILS') section.open = true;
  section.innerHTML = `<summary><span>${Utils.escapeHtml(group.title)}</span><small>${Utils.escapeHtml(group.hint)}</small></summary><div class="mvu-managed-body">${createMvuManagedFieldHtml(field, def, value)}</div>`;
  return section;
}

function ensureMvuHtmlBindings(fields = []) {
  const mvu = conversation?.mvu;
  if (!mvu?.state) return [];
  if (!mvu.html) mvu.html = '<div class="mvu-root"></div>';

  const missing = getUnboundMvuFields(fields);
  if (!missing.length) return [];

  const host = document.createElement('div');
  host.innerHTML = mvu.html;
  let root = host.firstElementChild;
  if (!root) {
    root = document.createElement('div');
    root.className = 'mvu-root';
    host.appendChild(root);
  }

  const repaired = [];
  for (const field of missing) {
    const value = mvu.state[field];
    const def = mvu.schema?.[field] || {};
    const group = getMvuFieldDisplayGroup(field, def, value);
    let section = upgradeMvuSemanticSection(host, group.key, field, def, value) || host.querySelector(`[data-mvu-managed-section="${group.key}"]`);
    if (!section) {
      section = document.createElement('details');
      section.className = 'mvu-section mvu-managed-section';
      section.dataset.mvuManagedSection = group.key;
      section.dataset.mvuSection = group.key;
      section.open = true;
      section.innerHTML = `<summary><span>${Utils.escapeHtml(group.title)}</span><small>${Utils.escapeHtml(group.hint)}</small></summary><div class="mvu-managed-body"></div>`;
      root.appendChild(section);
    }
    const hasBinding = section.querySelector(`[data-field="${field}"], [data-field-list="${field}"], [data-field-bar="${field}"]`);
    if (!hasBinding) {
      const body = section.querySelector('.mvu-managed-body') || section;
      body.insertAdjacentHTML('beforeend', createMvuManagedFieldHtml(field, def, value));
    }
    repaired.push(field);
  }

  if (repaired.length) mvu.html = host.innerHTML;
  return repaired;
}

function auditMvuStructure() {
  const mvu = conversation?.mvu;
  const result = {
    unboundFields: [],
    duplicateBindings: [],
    staleBindings: [],
    legacyFields: [],
    conflictingCollections: [],
    staticSections: [],
  };
  if (!mvu?.state) return result;
  const state = mvu.state || {};
  const schema = mvu.schema || {};
  const host = document.createElement('div');
  host.innerHTML = mvu.html || '';
  const counts = new Map();
  const bump = field => {
    if (!field) return;
    counts.set(field, (counts.get(field) || 0) + 1);
    if (!(field in state)) result.staleBindings.push(field);
  };
  host.querySelectorAll('[data-field]').forEach(el => bump(el.dataset.field));
  host.querySelectorAll('[data-field-list]').forEach(el => bump(el.dataset.fieldList));
  host.querySelectorAll('[data-field-bar]').forEach(el => bump(el.dataset.fieldBar));
  result.duplicateBindings = [...counts.entries()].filter(([, count]) => count > 1).map(([field, count]) => ({ field, count }));
  result.unboundFields = getUnboundMvuFields();
  result.staleBindings = [...new Set(result.staleBindings)];
  result.legacyFields = Object.keys(state).filter(field => /_(name|profile|outfit|affection|relation|personality|attitude|thoughts|location|status|role|identity|desc|description|note)$/.test(field));
  if ('main_quest' in state && Array.isArray(state.main_quests)) result.conflictingCollections.push('main_quest/main_quests');
  if ('side_quest' in state && Array.isArray(state.side_quests)) result.conflictingCollections.push('side_quest/side_quests');
  for (const [field] of Object.entries(schema)) {
    if (!(field in state) && !isInternalMvuField(field)) result.staleBindings.push(`schema:${field}`);
  }
  const characterSection = findMvuSemanticSection(host, 'characters');
  if (characterSection && !characterSection.querySelector('[data-field-list="characters"]')) result.staticSections.push('characters');
  return result;
}

function normalizeMvuHtmlSections(fields = []) {
  const mvu = conversation?.mvu;
  if (!mvu?.html || !mvu?.state) return false;
  const host = document.createElement('div');
  host.innerHTML = mvu.html;
  let changed = false;
  const specs = [
    { key: 'characters', field: 'characters' },
    { key: 'quests-main', field: 'main_quests' },
    { key: 'quests-side', field: 'side_quests' },
  ];
  const targets = fields?.length ? new Set(fields) : null;

  for (const spec of specs) {
    if (targets && !targets.has(spec.field)) continue;
    if (!Array.isArray(mvu.state[spec.field])) continue;
    const def = mvu.schema?.[spec.field] || {};
    const value = mvu.state[spec.field];
    const selectors = [
      `[data-mvu-managed-section="${spec.key}"]`,
      `[data-mvu-section="${spec.key}"]`,
      `[data-field-list="${spec.field}"]`,
    ];
    let sections = [...host.querySelectorAll(selectors.join(','))]
      .map(el => el.matches('[data-field-list]') ? (el.closest('.mvu-section, details, section, article, .mvu-panel, div') || el) : el);
    sections = [...new Set(sections)].filter(Boolean);
    const semantic = findMvuSemanticSection(host, spec.key);
    if (semantic && !sections.includes(semantic)) sections.push(semantic);
    if (!sections.length) continue;

    const keep = sections.find(section => section.querySelector(`[data-field-list="${spec.field}"]`)) || sections[0];
    for (const section of sections) {
      if (section !== keep && !section.contains(keep)) {
        section.remove();
        changed = true;
      }
    }
    keep.classList.add('mvu-section', 'mvu-managed-section');
    keep.dataset.mvuManagedSection = spec.key;
    keep.dataset.mvuSection = spec.key;
    if (keep.tagName === 'DETAILS') keep.open = true;
    if (!keep.querySelector(`[data-field-list="${spec.field}"]`)) {
      const group = getMvuFieldDisplayGroup(spec.field, def, value);
      keep.innerHTML = `<summary><span>${Utils.escapeHtml(group.title)}</span><small>${Utils.escapeHtml(group.hint)}</small></summary><div class="mvu-managed-body">${createMvuManagedFieldHtml(spec.field, def, value)}</div>`;
      changed = true;
    }
  }

  const nextHtml = host.innerHTML;
  if (changed && nextHtml !== mvu.html) mvu.html = nextHtml;
  return changed;
}

function normalizeMvuStructure(fields = []) {
  const mvu = conversation?.mvu;
  if (!mvu?.state || !mvu?.schema) return { changed: false, repaired: [], audit: auditMvuStructure() };
  let changed = false;
  changed = migrateMvuExpandableCollections() || changed;
  changed = syncMvuHtmlWithState() || changed;

  const state = mvu.state;
  const schema = mvu.schema;
  if (Array.isArray(state.main_quests) && state.main_quest !== undefined) {
    delete state.main_quest;
    delete schema.main_quest;
    changed = true;
  }
  if (Array.isArray(state.side_quests) && state.side_quest !== undefined) {
    delete state.side_quest;
    delete schema.side_quest;
    changed = true;
  }
  for (const key of Object.keys(schema)) {
    if (!(key in state) && !isInternalMvuField(key)) {
      delete schema[key];
      changed = true;
    }
  }

  changed = normalizeMvuHtmlSections(fields) || changed;
  const repaired = ensureMvuHtmlBindings(fields);
  if (repaired.length) changed = true;
  return { changed, repaired, audit: auditMvuStructure() };
}

function warnUnboundMvuFields(prefix = '美化视图未同步', fields = null) {
  const missing = getUnboundMvuFields(fields);
  if (!missing.length) return false;
  UI.showToast(`${prefix}：${missing.slice(0, 3).join('、')}${missing.length > 3 ? ' 等' : ''}`, 'info');
  return true;
}

const MVUGameRenderer = {
  detailMap: new Map(),

  render(container, mvuData, options = {}) {
    if (!container || !mvuData) return;
    const model = this.buildModel(mvuData, options);
    this.detailMap = new Map();
    let html = '<div class="mvu-game-view">';
    html += this.renderHero(model);
    html += this.renderTabs(model);
    html += `<div class="mvu-game-pane">${this.renderActivePane(model)}</div>`;
    html += this.renderDetailModal();
    html += '</div>';
    container.innerHTML = html;
  },

  openDetail(tab, id) {
    const item = this.detailMap.get(`${tab}:${id}`);
    const overlay = document.getElementById('mvuGameDetailOverlay');
    const body = document.getElementById('mvuGameDetailBody');
    if (!item || !overlay || !body) return;
    body.innerHTML = this.renderGameDetail(item);
    overlay.classList.add('visible');
  },

  buildModel(mvuData, options = {}) {
    const schema = mvuData.schema || {};
    const state = mvuData.state || {};
    const query = (options.query || '').trim().toLowerCase();
    const model = { player: [], world: [], characters: new Map(), inventory: [], quests: [], skills: [], other: [] };

    for (const [field, value] of Object.entries(state)) {
      const def = schema[field] || {};
      const entry = { field, value, def, label: def.label || field, text: this.formatValue(value) };
      const searchable = `${field} ${entry.label} ${entry.text}`.toLowerCase();
      if (query && !searchable.includes(query)) continue;
      const category = this.classify(entry);

      if (category === 'inventory') this.pushListEntries(model.inventory, entry, 'item');
      else if (category === 'quest') this.pushListEntries(model.quests, entry, 'quest');
      else if (category === 'skill') this.pushListEntries(model.skills, entry, 'skill');
      else if (category === 'character') this.addCharacter(model.characters, entry);
      else if (category === 'world') model.world.push(entry);
      else if (category === 'player') model.player.push(entry);
      else model.other.push(entry);
    }

    model.characters = Array.from(model.characters.values());
    return model;
  },

  classify(entry) {
    const key = `${entry.field} ${entry.label}`.toLowerCase();
    if (/inventory|items|item|bag|equipment|weapon|armor|物品|道具|背包|装备|武器|防具/.test(key)) return 'inventory';
    if (/quest|task|objective|mission|任务|目标|委托|主线|支线/.test(key)) return 'quest';
    if (/skill|ability|spell|talent|技能|能力|法术|天赋|熟练/.test(key)) return 'skill';
    if (/character|npc|role|profile|affection|relation|attitude|thought|outfit|角色|人物|好感|关系|态度|心理|服装/.test(key)) return 'character';
    if (/date|time|location|weather|environment|world|faction|place|时间|日期|地点|位置|天气|环境|世界|势力/.test(key)) return 'world';
    if (/hp|mp|sp|sanity|health|stamina|energy|hunger|exp|level|money|coin|gold|title|status|生命|体力|精力|理智|经验|等级|金钱|金币|称号|状态/.test(key)) return 'player';
    if (entry.def.type === 'bar' || entry.def.type === 'number' || typeof entry.value === 'number') return 'player';
    return 'other';
  },

  pushListEntries(target, entry, type) {
    if (Array.isArray(entry.value)) {
      entry.value.forEach((item, index) => target.push({ ...entry, item, index, type, id: this.idFor(type, entry.field, index) }));
    } else {
      target.push({ ...entry, item: entry.value, index: -1, type, id: this.idFor(type, entry.field, -1) });
    }
  },

  idFor(type, field, index = -1) {
    return `${type}:${encodeURIComponent(String(field || 'item'))}:${index}`;
  },

  addCharacter(map, entry) {
    const prefix = this.prefixOf(entry.field);
    const id = prefix || entry.field;
    if (!map.has(id)) map.set(id, { id, title: this.characterTitle(id, entry), fields: [] });
    const group = map.get(id);
    group.fields.push(entry);
    if (/profile|name|角色|人物|档案/.test(`${entry.field} ${entry.label}`.toLowerCase())) {
      group.title = this.shortValue(entry.value) || group.title;
    }
  },

  prefixOf(field) {
    const parts = String(field).split('_');
    return parts.length > 1 ? parts[0] : '';
  },

  characterTitle(id, entry) {
    if (entry.label && entry.label.includes(' - ')) return entry.label.split(' - ')[0];
    return id || entry.label || entry.field;
  },

  renderHero(model) {
    const location = model.world.find(e => /location|place|地点|位置/.test(`${e.field} ${e.label}`.toLowerCase()));
    const time = model.world.find(e => /date|time|日期|时间/.test(`${e.field} ${e.label}`.toLowerCase()));
    const realm = this.findFirst(model.player, /realm|level|cultivation|境界|修为|等级|称号/);
    const title = realm ? this.shortValue(realm.value) : '无名修士';
    const subtitle = [location ? `所在：${this.shortValue(location.value)}` : '', time ? `${time.label}: ${this.shortValue(time.value)}` : ''].filter(Boolean).join(' / ');
    const keyBars = model.player.filter(e => e.def.type === 'bar' || typeof e.value === 'number').slice(0, 3);
    return `<div class="mvu-game-hero mvu-interactive" data-mvu-detail data-mvu-title="${this.attr(title)}" data-mvu-type="修行总览" data-mvu-desc="${this.attr(subtitle)}">
      <div class="mvu-game-eyebrow">Cultivation Chronicle</div>
      <div class="mvu-game-title">${this.esc(title)}</div>
      <div class="mvu-realm-badge">${this.esc(realm ? realm.label : '修行中')}</div>
      <div class="mvu-game-subtitle">${this.esc(subtitle || '状态栏游戏视图')}</div>
      <div class="mvu-cultivation-core">
        ${keyBars.map(entry => this.renderMiniBar(entry)).join('')}
      </div>
    </div>`;
  },

  findFirst(entries, regex) {
    return entries.find(e => regex.test(`${e.field} ${e.label}`.toLowerCase()));
  },

  renderMiniBar(entry) {
    const max = Number(entry.def.max || (Number(entry.value) > 100 ? Number(entry.value) : 100));
    const num = Number(entry.value);
    const isNumeric = Number.isFinite(num);
    const pct = isNumeric && max ? Math.max(0, Math.min(100, (num / max) * 100)) : 0;
    return `<div class="mvu-game-bar-card" data-mvu-detail data-mvu-field="${this.attr(entry.field)}">
      <div class="mvu-game-row">
        <span class="mvu-game-label">${this.esc(entry.label)}</span>
        <span class="mvu-game-value">${this.esc(isNumeric ? `${num}/${max}` : this.shortValue(entry.value))}</span>
      </div>
      ${isNumeric ? `<div class="mvu-game-track"><div class="mvu-game-fill" style="width:${pct}%"></div></div>` : ''}
    </div>`;
  },

  renderTabs(model) {
    const tabs = [
      ['character', '人物', model.player.length + model.characters.length],
      ['inventory', '储物', model.inventory.length],
      ['skills', '功法', model.skills.length],
      ['quests', '任务', model.quests.length],
      ['world', '世界', model.world.length],
    ];
    return `<div class="mvu-game-tabs">${tabs.map(([id, label, count]) => `
      <button class="mvu-game-tab${mvuGameTab === id ? ' active' : ''}" onclick="setMvuGameTab('${id}')">${this.renderIcon(id)}<span>${label}</span><span class="mvu-game-section-count"> ${count}</span></button>
    `).join('')}</div>`;
  },

  renderActivePane(model) {
    if (mvuGameTab === 'inventory') return this.renderListPane('inventory', this.inventoryItems(model.inventory), '储物袋空空如也', true);
    if (mvuGameTab === 'skills') return this.renderListPane('skills', this.skillItems(model.skills), '尚未记录功法/术法');
    if (mvuGameTab === 'quests') return this.renderListPane('quests', this.questItems(model.quests), '暂无任务因果');
    if (mvuGameTab === 'world') return this.renderListPane('world', this.worldItems(model.world, model.other), '暂无世界信息');
    return this.renderListPane('character', this.characterItems(model), '暂无人物状态');
  },

  renderListPane(tab, items, emptyText, grid = false) {
    if (!items.length) return this.empty(emptyText);
    const selected = this.ensureSelection(tab, items);
    items.forEach(item => this.detailMap.set(`${tab}:${item.id}`, item));
    return `<div class="mvu-game-layout">
      <div class="${grid ? 'mvu-game-list-grid' : 'mvu-game-list'}">${items.map(item => this.renderEntry(tab, item, selected?.id === item.id)).join('')}</div>
    </div>`;
  },

  ensureSelection(tab, items) {
    if (!items.length) {
      mvuGameSelection[tab] = null;
      return null;
    }
    const current = mvuGameSelection[tab];
    const selected = items.find(item => item.id === current) || items[0];
    if (selected.id !== current) mvuGameSelection[tab] = selected.id;
    return selected;
  },

  renderEntry(tab, item, active) {
    const sub = item.sub || item.desc || '';
    return `<button type="button" class="mvu-game-entry${active ? ' active' : ''}" onclick="openMvuGameDetail('${tab}', '${this.attr(item.id)}')">
      <span class="mvu-game-entry-icon ${tab}">${this.renderIcon(item.iconType || tab, item.icon || this.firstChar(item.title))}</span>
      <span class="mvu-game-entry-main">
        <span class="mvu-game-entry-title">${this.esc(item.title)}</span>
        ${sub ? `<span class="mvu-game-entry-sub">${this.esc(this.shortText(sub, 48))}</span>` : ''}
      </span>
      <span class="mvu-game-entry-tag">${this.esc(item.type || '详情')}</span>
    </button>`;
  },

  renderDetailModal() {
    return `<div class="mvu-game-modal" id="mvuGameDetailOverlay" onclick="if(event.target===this) closeMvuGameDetail()">
      <div class="mvu-game-modal-card">
        <button type="button" class="mvu-game-modal-close" onclick="closeMvuGameDetail()" aria-label="关闭">×</button>
        <div id="mvuGameDetailBody"></div>
      </div>
    </div>`;
  },

  renderGameDetail(item) {
    const attrs = (item.attrs || []).filter(row => row[1] !== undefined && row[1] !== '');
    return `<div class="mvu-game-modal-head">
        <div class="mvu-game-modal-icon ${this.esc(item.tab || '')}">${this.renderIcon(item.iconType || item.tab, item.icon || this.firstChar(item.title))}</div>
        <div>
          <div class="mvu-game-modal-title">${this.esc(item.title)}</div>
          <div class="mvu-game-modal-subtitle">${this.esc(item.sub || this.typeSubtitle(item))}</div>
        </div>
        <div class="mvu-game-modal-badge">${this.esc(item.type || '详情')}</div>
      </div>
      ${item.desc ? `<div class="mvu-game-modal-desc">${this.esc(item.desc).replace(/\n/g, '<br>')}</div>` : ''}
      ${attrs.length ? `<div class="mvu-game-modal-attrs">${attrs.map(([label, value]) => `
        <div class="mvu-game-modal-attr"><span>${this.esc(label)}</span><span>${this.esc(this.formatValue(value)).replace(/\n/g, '<br>')}</span></div>
      `).join('')}</div>` : ''}
    `;
  },

  typeSubtitle(item) {
    const map = { character: '人物档案', inventory: '储物说明', skills: '功法秘录', quests: '任务卷宗', world: '世界情报' };
    return map[item.tab] || '详情';
  },

  renderIcon(type, fallback) {
    return MVUGameIcons[type] || MVUGameIcons.item || `<span>${this.esc(fallback || '?')}</span>`;
  },

  characterItems(model) {
    const stats = model.player.slice(0, 10).map(entry => ({
      id: this.idFor('player', entry.field, -1),
      tab: 'character',
      iconType: 'status',
      title: entry.label,
      type: entry.def.type === 'bar' ? '状态条' : '状态',
      icon: this.firstChar(entry.label),
      sub: this.shortValue(entry.value),
      desc: this.formatValue(entry.value),
      attrs: this.entryAttrs(entry),
    }));
    const chars = model.characters.slice(0, 10).map(char => ({
      id: this.idFor('character', char.id, -1),
      tab: 'character',
      iconType: 'character',
      title: char.title,
      type: '角色',
      icon: this.firstChar(char.title),
      sub: char.fields.slice(0, 2).map(e => `${e.label}: ${this.shortValue(e.value)}`).join(' / '),
      desc: char.fields.slice(0, 4).map(e => `${e.label}：${this.shortValue(e.value)}`).join('\n'),
      attrs: char.fields.slice(0, 8).map(e => [e.label, e.value]),
    }));
    return [...stats, ...chars];
  },

  inventoryItems(items) {
    return items.slice(0, 30).map(entry => {
      const name = this.itemName(entry.item);
      const count = this.itemCount(entry.item);
      return {
        id: entry.id,
        tab: 'inventory',
        iconType: 'inventory',
        title: name,
        type: this.objectProp(entry.item, ['type', 'category', 'rarity']) || '物品',
        icon: this.firstChar(name),
        sub: count ? `数量 ${count}` : (this.itemDesc(entry.item) || entry.label),
        desc: this.itemDesc(entry.item) || `${name} 记录在「${entry.label}」中。`,
        attrs: this.itemAttrs(entry, [['数量', count], ['来源', entry.label]]),
      };
    });
  },

  questItems(quests) {
    return quests.slice(0, 12).map(entry => {
      const title = this.itemName(entry.item);
      return {
        id: entry.id,
        tab: 'quests',
        iconType: 'quests',
        title,
        type: this.objectProp(entry.item, ['status', 'stage', 'type']) || '任务',
        icon: '令',
        sub: this.itemDesc(entry.item) || this.shortValue(entry.item),
        desc: this.itemDesc(entry.item) || this.formatValue(entry.item),
        attrs: this.itemAttrs(entry, [['归属', entry.label]]),
      };
    });
  },

  skillItems(skills) {
    return skills.slice(0, 14).map(entry => {
      const title = this.itemName(entry.item);
      return {
        id: entry.id,
        tab: 'skills',
        iconType: 'skills',
        title,
        type: this.objectProp(entry.item, ['realm', 'level', 'type', 'category']) || '功法',
        icon: '法',
        sub: this.objectProp(entry.item, ['effect', 'status']) || this.itemDesc(entry.item) || this.shortValue(entry.item),
        desc: this.itemDesc(entry.item) || this.formatValue(entry.item),
        attrs: this.itemAttrs(entry, [['来源', entry.label]]),
      };
    });
  },

  worldItems(world, other) {
    return [...world, ...other].slice(0, 24).map(entry => ({
      id: this.idFor('world', entry.field, -1),
      tab: 'world',
      iconType: /location|place|地点|位置/.test(`${entry.field} ${entry.label}`.toLowerCase()) ? 'location' : 'world',
      title: entry.label,
      type: /location|place|地点|位置/.test(`${entry.field} ${entry.label}`.toLowerCase()) ? '地点' : '世界',
      icon: this.firstChar(entry.label),
      sub: this.shortValue(entry.value),
      desc: this.formatValue(entry.value),
      attrs: this.entryAttrs(entry),
    }));
  },

  entryAttrs(entry) {
    const rows = [];
    if (entry.def?.max !== undefined) rows.push(['上限', entry.def.max]);
    if (entry.def?.rule) rows.push(['规则', entry.def.rule]);
    rows.push(['当前', entry.value]);
    return rows;
  },

  itemAttrs(entry, baseRows = []) {
    const rows = baseRows.filter(row => row[1] !== undefined && row[1] !== '');
    if (entry.item && typeof entry.item === 'object') {
      for (const [key, value] of Object.entries(entry.item)) {
        if (['name', 'title', 'label', 'desc', 'detail', 'description', 'note'].includes(key)) continue;
        rows.push([this.prettyKey(key), value]);
      }
    }
    return rows.length ? rows : [['记录', this.formatValue(entry.item)]];
  },

  objectProp(item, keys) {
    if (!item || typeof item !== 'object') return '';
    for (const key of keys) {
      if (item[key] !== undefined && item[key] !== '') return String(item[key]);
    }
    return '';
  },

  firstChar(text) {
    return String(text || '?').trim().charAt(0) || '?';
  },

  shortText(value, max = 80) {
    const text = this.formatValue(value).replace(/\s+/g, ' ').trim();
    return text.length > max ? text.slice(0, Math.max(0, max - 3)) + '...' : text;
  },

  renderBars(entries) {
    if (!entries.length) return '';
    const bars = entries.slice(0, 8).map(entry => {
      const max = Number(entry.def.max || (Number(entry.value) > 100 ? Number(entry.value) : 100));
      const num = Number(entry.value);
      const pct = Number.isFinite(num) && max ? Math.max(0, Math.min(100, (num / max) * 100)) : 0;
      const isNumeric = Number.isFinite(num);
      return `<div class="mvu-game-bar-card" data-mvu-detail data-mvu-field="${this.attr(entry.field)}">
        <div class="mvu-game-row">
          <span class="mvu-game-label">${this.esc(entry.label)}</span>
          <span class="mvu-game-value">${this.esc(isNumeric ? `${num}/${max}` : this.shortValue(entry.value))}</span>
        </div>
        ${isNumeric ? `<div class="mvu-game-track"><div class="mvu-game-fill" style="width:${pct}%"></div></div>` : ''}
      </div>`;
    }).join('');
    return this.section('主角状态', entries.length, `<div class="mvu-game-bars">${bars}</div>`);
  },

  renderWorld(entries) {
    if (!entries.length) return '';
    const chips = entries.slice(0, 10).map(entry => `<span class="mvu-game-chip" data-mvu-detail data-mvu-field="${this.attr(entry.field)}">${this.esc(entry.label)}：${this.esc(this.shortValue(entry.value))}</span>`).join('');
    return this.section('世界信息', entries.length, `<div class="mvu-game-chip-row">${chips}</div>`);
  },

  renderCharacters(characters) {
    if (!characters.length) return '';
    const cards = characters.slice(0, 8).map(char => {
      const meta = char.fields.slice(0, 3).map(e => `${e.label}: ${this.shortValue(e.value)}`).join('\n');
      return `<div class="mvu-game-card" data-mvu-detail data-mvu-title="${this.attr(char.title)}" data-mvu-type="角色" data-mvu-desc="${this.attr(meta)}">
        <div class="mvu-game-card-title">${this.esc(char.title)}</div>
        <div class="mvu-game-card-meta">${this.esc(meta || `${char.fields.length} 个角色字段`).replace(/\n/g, '<br>')}</div>
      </div>`;
    }).join('');
    return this.section('角色', characters.length, `<div class="mvu-game-grid">${cards}</div>`);
  },

  renderInventory(items) {
    if (!items.length) return '';
    const html = items.slice(0, 24).map(entry => {
      const name = this.itemName(entry.item);
      const count = this.itemCount(entry.item);
      const desc = this.itemDesc(entry.item) || `${entry.label}: ${name}`;
      return `<div class="mvu-game-item" data-mvu-detail data-mvu-field="${this.attr(entry.field)}" data-mvu-title="${this.attr(name)}" data-mvu-type="物品" data-mvu-desc="${this.attr(desc)}">
        ${count ? `<span class="mvu-game-item-count">${this.esc(count)}</span>` : ''}
        <span class="mvu-game-item-icon">${this.esc(name.charAt(0) || '?')}</span>
        <span class="mvu-game-item-name">${this.esc(name)}</span>
      </div>`;
    }).join('');
    return this.section('背包', items.length, `<div class="mvu-game-inventory">${html}</div>`);
  },

  renderQuests(quests) {
    if (!quests.length) return '';
    const html = quests.slice(0, 8).map(entry => {
      const title = this.itemName(entry.item);
      const desc = this.itemDesc(entry.item) || this.formatValue(entry.item);
      return `<div class="mvu-game-quest" data-mvu-detail data-mvu-field="${this.attr(entry.field)}" data-mvu-title="${this.attr(title)}" data-mvu-type="任务" data-mvu-desc="${this.attr(desc)}">
        <div class="mvu-game-card-title">${this.esc(title)}</div>
        <div class="mvu-game-card-meta">${this.esc(desc).replace(/\n/g, '<br>')}</div>
      </div>`;
    }).join('');
    return this.section('任务', quests.length, `<div class="mvu-game-grid">${html}</div>`);
  },

  renderSkills(skills) {
    if (!skills.length) return '';
    const html = skills.slice(0, 10).map(entry => {
      const title = this.itemName(entry.item);
      const desc = this.itemDesc(entry.item) || this.formatValue(entry.item);
      return `<div class="mvu-game-skill" data-mvu-detail data-mvu-field="${this.attr(entry.field)}" data-mvu-title="${this.attr(title)}" data-mvu-type="技能" data-mvu-desc="${this.attr(desc)}">
        <div class="mvu-game-card-title">${this.esc(title)}</div>
        <div class="mvu-game-card-meta">${this.esc(desc).replace(/\n/g, '<br>')}</div>
      </div>`;
    }).join('');
    return this.section('技能', skills.length, `<div class="mvu-game-grid">${html}</div>`);
  },

  renderOther(entries) {
    if (!entries.length) return '';
    const chips = entries.slice(0, 14).map(entry => `<span class="mvu-game-chip" data-mvu-detail data-mvu-field="${this.attr(entry.field)}">${this.esc(entry.label)}：${this.esc(this.shortValue(entry.value))}</span>`).join('');
    return this.section('其他', entries.length, `<div class="mvu-game-chip-row">${chips}</div>`);
  },

  section(title, count, body) {
    return `<section class="mvu-game-section">
      <div class="mvu-game-section-head"><span class="mvu-game-section-title">${this.esc(title)}</span><span class="mvu-game-section-count">${count}</span></div>
      ${body}
    </section>`;
  },

  empty(text) {
    return `<div class="mvu-game-empty">${this.esc(text)}</div>`;
  },

  itemName(item) {
    if (item && typeof item === 'object') return String(item.name || item.title || item.label || item.id || '未命名');
    return this.shortValue(item) || '未命名';
  },

  itemDesc(item) {
    if (item && typeof item === 'object') return String(item.desc || item.detail || item.description || item.effect || item.note || '');
    return '';
  },

  itemCount(item) {
    if (item && typeof item === 'object' && item.count !== undefined) return String(item.count);
    return '';
  },

  prettyKey(key) {
    const map = {
      effect: '效果',
      count: '数量',
      rarity: '稀有度',
      status: '状态',
      location: '位置',
      owner: '持有者',
      realm: '境界',
      level: '层级',
      progress: '进度',
      relation: '关系',
      faction: '势力',
      type: '类型',
      category: '类别',
    };
    return map[key] || key;
  },

  shortValue(value) {
    const text = this.formatValue(value).replace(/\s+/g, ' ').trim();
    return text.length > 80 ? text.slice(0, 77) + '...' : text;
  },

  formatValue(value) {
    if (value === null || value === undefined) return '';
    if (Array.isArray(value)) return value.map(v => this.formatValue(v)).join('\n');
    if (typeof value === 'object') return Object.entries(value).map(([k, v]) => `${k}: ${this.formatValue(v)}`).join('\n');
    return String(value);
  },

  esc(value) { return Utils.escapeHtml(String(value ?? '')); },
  attr(value) { return this.esc(value).replace(/`/g, '&#96;'); },
};

const MVUInteraction = {
  passiveSelector: 'button,input,textarea,select,a,summary,.mvu-tab,[data-tab],[data-no-mvu-popup]',
  explicitSelector: '[data-mvu-detail],[data-mvu-action],[data-mvu-field-detail]',
  inferredSelector: '.mvu-list-item,.mvu-item,.mvu-card,.mvu-chip,.mvu-tag,[data-role="item"],[data-role="character"],[data-role="quest"],[data-role="skill"]',

  enhance(container, mvuData) {
    if (!container || !mvuData) return;
    container._mvuInteractionData = mvuData;
    if (!container.dataset.mvuInteractionBound) {
      container.dataset.mvuInteractionBound = '1';
      container.addEventListener('click', (event) => this.handleClick(event, container, container._mvuInteractionData));
      container.addEventListener('keydown', (event) => {
        if (event.key !== 'Enter' && event.key !== ' ') return;
        const target = event.target.closest('.mvu-interactive');
        if (!target || !container.contains(target)) return;
        event.preventDefault();
        this.openForElement(target, container, container._mvuInteractionData);
      });
    }
    this.markInteractive(container);
  },

  markInteractive(container) {
    container.querySelectorAll('.mvu-interactive').forEach(el => {
      el.classList.remove('mvu-interactive');
      el.removeAttribute('tabindex');
    });

    const candidates = new Set();
    container.querySelectorAll(this.explicitSelector).forEach(el => candidates.add(el));
    container.querySelectorAll('[data-field],[data-field-bar]').forEach(el => candidates.add(el));
    container.querySelectorAll('[data-field-list]').forEach(list => {
      Array.from(list.children).forEach(child => candidates.add(child));
    });
    container.querySelectorAll(this.inferredSelector).forEach(el => candidates.add(el));

    for (const el of candidates) {
      if (!this.canEnhance(el, container)) continue;
      el.classList.add('mvu-interactive');
      if (!el.hasAttribute('tabindex')) el.tabIndex = 0;
    }
  },

  canEnhance(el, container) {
    if (!el || !container.contains(el)) return false;
    if (el.closest(this.passiveSelector)) return false;
    if (el.closest('.mvu-tabs')) return false;
    const text = (el.innerText || el.textContent || '').trim();
    if (!text && !el.dataset.field && !el.dataset.fieldBar && !el.dataset.mvuTitle) return false;
    if (text.length > 180 && !el.matches(this.explicitSelector) && !el.dataset.field && !el.dataset.fieldBar) return false;
    return true;
  },

  handleClick(event, container, mvuData) {
    if (event.target.closest(this.passiveSelector)) return;
    const target = event.target.closest('.mvu-interactive');
    if (!target || !container.contains(target)) return;
    event.preventDefault();
    event.stopPropagation();
    this.openForElement(target, container, mvuData);
  },

  openForElement(el, container, mvuData) {
    const detail = this.buildDetail(el, container, mvuData);
    if (detail) openMvuDetail(detail);
  },

  buildDetail(el, container, mvuData) {
    const schema = mvuData?.schema || {};
    const state = mvuData?.state || {};
    const listEl = el.closest('[data-field-list]');
    const directField = el.dataset.mvuField || el.dataset.mvuFieldDetail || el.dataset.field || el.dataset.fieldBar;
    const field = directField || listEl?.dataset.fieldList || '';
    const def = field ? (schema[field] || {}) : {};
    const value = field ? state[field] : undefined;
    const listIndex = listEl ? Array.from(listEl.children).indexOf(el) : -1;
    const itemValue = listIndex >= 0 && Array.isArray(value) ? value[listIndex] : undefined;
    const objectValue = itemValue && typeof itemValue === 'object' ? itemValue : null;

    const rawTitle = el.dataset.mvuTitle || objectValue?.name || objectValue?.title || objectValue?.label
      || this.cleanText(el.innerText || el.textContent) || def.label || field || '详情';
    const title = this.cleanText(rawTitle);
    const type = el.dataset.mvuType || objectValue?.type || objectValue?.category || this.inferType(field, def, el, listEl);
    const desc = el.dataset.mvuDesc || objectValue?.desc || objectValue?.detail || objectValue?.description
      || objectValue?.note || def.rule || this.fallbackDescription(title, field, itemValue ?? value);

    const rows = [];
    if (def.max !== undefined) rows.push(['上限', def.max]);
    if (listIndex >= 0) rows.push(['序号', String(listIndex + 1)]);
    if (objectValue) {
      for (const [key, val] of Object.entries(objectValue)) {
        if (['name', 'title', 'label', 'type', 'category', 'desc', 'detail', 'description', 'note'].includes(key)) continue;
        rows.push([this.prettyKey(key), this.formatValue(val)]);
      }
    } else if (itemValue !== undefined) {
      rows.push(['当前项', this.formatValue(itemValue)]);
    } else if (value !== undefined) {
      rows.push(['当前', this.formatValue(value)]);
    }
    if (def.rule) rows.push(['来源', def.rule]);

    return { title, type, desc: this.formatValue(desc), field, rows };
  },

  cleanText(text) {
    return String(text || '').replace(/\s+/g, ' ').trim();
  },

  formatValue(value) {
    if (value === null || value === undefined) return '';
    if (Array.isArray(value)) return value.map(v => this.formatValue(v)).join('\n');
    if (typeof value === 'object') {
      return Object.entries(value).map(([k, v]) => `${this.prettyKey(k)}：${this.formatValue(v)}`).join('\n');
    }
    return String(value);
  },

  prettyKey(key) {
    const map = { effect: '效果', count: '数量', rarity: '稀有度', status: '状态', location: '位置', owner: '持有者' };
    return map[key] || key;
  },

  inferType(field, def, el, listEl) {
    const haystack = `${field || ''} ${def.label || ''} ${el.className || ''} ${listEl?.dataset.fieldList || ''}`.toLowerCase();
    if (/inventory|item|bag|weapon|armor|物品|道具|装备/.test(haystack)) return '物品';
    if (/quest|task|任务|委托|目标/.test(haystack)) return '任务';
    if (/skill|ability|spell|技能|法术|能力/.test(haystack)) return '技能';
    if (/character|npc|role|profile|关系|角色|人物/.test(haystack)) return '角色';
    if (/location|map|place|地点|位置|地图/.test(haystack)) return '地点';
    if (def.type === 'bar') return '状态条';
    return def.type ? `变量 · ${def.type}` : '详情';
  },

  fallbackDescription(title, field, value) {
    const formatted = this.formatValue(value);
    if (formatted) return formatted;
    return field ? `关于「${title}」的记录。` : '可交互对象。';
  },
};

function openMvuDetail(detail) {

    `).join('')}</div>` : ''}

  overlay.dataset.title = detail.title || '';
  overlay.dataset.field = detail.field || '';

// ============================================================
// Input Handling
// ============================================================
function handleInputKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
}

async function handleSend() {
  if (isStreaming) {
    stopStreaming();
    return;
  }

  const textarea = document.getElementById('inputTextarea');
  const text = textarea.value.trim();
  if (!text) return;

  // Validate API profile exists
  const settings = Storage.getSettings();
  const apiProfileId = settings.defaultApiProfileId;
  if (!apiProfileId) {
    UI.showToast('请先在设置中配置 API', 'error');
    return;
  }
  const profile = Storage.getApiProfile(apiProfileId);
  if (!profile) {
    UI.showToast('API 配置不存在，请检查设置', 'error');
    return;
  }

  // Clear input and options
  textarea.value = '';
  resetTextareaHeight();
  clearOptionsBar();
  // Temporarily remove init confirm bar during streaming (will re-show in onDone)
  const confirmBar = document.querySelector('.mvu-confirm-bar');
  if (confirmBar) confirmBar.remove();

  // User just sent a message, reset scroll state so we follow the new output
  userScrolledUp = false;

  // Push user message
  const userMsg = {
    id: Utils.generateId('msg'),
    role: 'user',
    content: text,
    timestamp: Date.now(),
    hidden: false,
  };
  if (editMvuMode) {
    editMvuMessages.push(userMsg);
  } else {
    conversation.messages.push(userMsg);
    Storage.saveConversation(conversation);
  }
  appendMessageElement(userMsg);

  // Stream AI response
  await streamAIResponse();
}

// ============================================================
// Stream Status Indicator
// ============================================================
function showStreamStatus(state, detail = '') {
  removeStreamStatus();
  const list = document.getElementById('messagesList');
  const el = document.createElement('div');
  el.className = `stream-status ${state}`;
  el.id = 'streamStatusIndicator';

  const labels = { connecting: '连接中...', streaming: '生成中', retrying: '重试中' };
  let label = labels[state] || state;
  if (detail) label += ' ' + detail;

  el.innerHTML = `<span class="status-dot"></span><span class="status-text">${label}</span><span class="status-timer" id="statusTimer"></span>`;
  list.appendChild(el);
  scrollToBottom(false);

  // Start elapsed timer
  streamStartTime = Date.now();
  if (streamStatusTimer) clearInterval(streamStatusTimer);
  streamStatusTimer = setInterval(updateStatusTimer, 1000);
}

function updateStreamStatusText(text) {
  const el = document.querySelector('#streamStatusIndicator .status-text');
  if (el) el.textContent = text;
}

function updateStatusTimer() {
  const el = document.getElementById('statusTimer');
  if (!el) return;
  const elapsed = Math.floor((Date.now() - streamStartTime) / 1000);
  el.textContent = elapsed + 's';
}

function removeStreamStatus() {
  const el = document.getElementById('streamStatusIndicator');
  if (el) el.remove();
  if (streamStatusTimer) { clearInterval(streamStatusTimer); streamStatusTimer = null; }
}

// ============================================================
// Streaming
// ============================================================
async function streamAIResponse(retryAttempt = 0) {
  isStreaming = true;
  streamAborted = false;
  streamStopRequested = false;
  updateSendButton();

  const MAX_AUTO_RETRIES = 2;
  const settings = Storage.getSettings();

  // Build prompt BEFORE adding AI placeholder
  let systemPrompt, messages;
  if (editMvuMode) {
    ({ systemPrompt, messages } = buildEditMvuPrompt());
  } else {
    ({ systemPrompt, messages } = PromptBuilder.buildMessages(conversation));
    _lastBuiltPrompt = { systemPrompt, messages };
  }

  // Create AI placeholder message
  const aiMsg = {
    id: Utils.generateId('msg'),
    role: 'assistant',
    content: '',
    timestamp: Date.now(),
    hidden: false,
    abstract: null,
  };
  if (editMvuMode) {
    editMvuMessages.push(aiMsg);
  } else {
    conversation.messages.push(aiMsg);
  }
  appendMessageElement(aiMsg);

  // Show connecting status
  showStreamStatus('connecting');

  const apiProfileId = settings.defaultApiProfileId;
  const model = settings.defaultModel;
  log('streamAIResponse', { phase: conversation.phase, apiProfileId, model, attempt: retryAttempt });

  currentAbortController = API.streamChat({
    apiProfileId,
    model,
    systemPrompt,
    messages,

    onStatus(status) {
      if (status === 'connecting') {
        showStreamStatus('connecting');
      } else if (status === 'streaming') {
        showStreamStatus('streaming');
      }
    },

    onChunk(chunk, fullText) {
      if (streamAborted) return;
      aiMsg.content = fullText;
      updateAssistantBubble(aiMsg.id, fullText, true);
      updateStreamStatusText(`生成中 (${fullText.length}字)`);
    },

    onDone(fullText, usage) {
      removeStreamStatus();

      if (streamAborted && !fullText) {
        fullText = aiMsg.content;
      }

      // Guard: if response is completely empty, treat as error
      if (!fullText || !fullText.trim()) {
        log('onDone with empty response, removing placeholder');
        if (editMvuMode) {
          editMvuMessages = editMvuMessages.filter(m => m.id !== aiMsg.id);
        } else {
          conversation.messages = conversation.messages.filter(m => m.id !== aiMsg.id);
          Storage.saveConversation(conversation);
        }
        const el = document.getElementById(`msg-${aiMsg.id}`);
        if (el) el.remove();
        UI.showToast('AI 返回空响应', 'error');
        isStreaming = false;
        streamAborted = false;
        streamStopRequested = false;
        currentAbortController = null;
        updateSendButton();
        return;
      }

      aiMsg.content = fullText;
      aiMsg.timestamp = Date.now();
      updateAssistantBubble(aiMsg.id, fullText, false);

      if (editMvuMode) {
        processEditMvuResponse(fullText);
      } else {
        const abstract = Summary.parseAbstract(fullText);
        if (abstract) aiMsg.abstract = abstract;

        // Apply refine: store refined story content back into the message
        const refineArr = MVU.parseRefine(fullText);
        if (refineArr && refineArr.length > 0) {
          // Replace the <story> content in fullText with refined version
          const originalStory = Utils.extractStoryContent(fullText);
          const refinedStory = MVU.applyRefine(originalStory, refineArr);
          if (refinedStory !== originalStory) {
            // Rebuild fullText with refined story (replace first <story> block)
            fullText = fullText.replace(
              /(<story>)([\s\S]*?)(<\/story>)/,
              (m, open, content, close) => open + MVU.applyRefine(content, refineArr) + close
            );
            aiMsg.content = fullText;
            updateAssistantBubble(aiMsg.id, fullText, false);
            log('[Refine] Applied', refineArr.length, 'replacements');
          }
        }

        processMvuFromResponse(fullText, aiMsg);
        processWritingAdvice(fullText);
        Storage.saveConversation(conversation);
        renderOptionsBar(fullText);
        if (summaryPanelOpen) renderSummaryPanel();
        checkBigSummaryTrigger();

        // Clear failed state since we succeeded
        lastFailedUserMsgId = null;
        removeRetryBar();
      }

      isStreaming = false;
      streamAborted = false;
      streamStopRequested = false;
      currentAbortController = null;
      updateSendButton();
      // Re-show init confirmation if draft is ready
      if (pendingMvuInit && conversation.phase === 'init') {
        showMvuInitConfirmation();
      }
      scrollToBottom(false);
    },

    onError(error, httpStatus) {
      removeStreamStatus();

      if (streamAborted || error === 'AbortError') {
        // User-initiated stop: keep partial content
        handleStreamStopped(aiMsg);
        return;
      }

      // If we already received substantial content, treat as successful completion
      if (aiMsg.content && aiMsg.content.length > 50) {
        log('Error after content received, treating as done:', error);
        handleStreamStopped(aiMsg);
        return;
      }

      const classified = API.classifyError(httpStatus || 0, error);
      const errDetail = `[${classified.type}] ${error}${httpStatus ? ' (HTTP ' + httpStatus + ')' : ''}`;
      log('API Error:', errDetail, classified, { apiProfileId, model, phase: conversation.phase, attempt: retryAttempt });

      // Remove the failed AI placeholder
      if (editMvuMode) {
        editMvuMessages = editMvuMessages.filter(m => m.id !== aiMsg.id);
      } else {
        conversation.messages = conversation.messages.filter(m => m.id !== aiMsg.id);
      }
      const aiEl = document.getElementById(`msg-${aiMsg.id}`);
      if (aiEl) aiEl.remove();

      // Auto-retry for retryable errors
      if (classified.retryable && retryAttempt < MAX_AUTO_RETRIES) {
        const delay = Math.min(1000 * Math.pow(2, retryAttempt), 8000) * (0.5 + Math.random() * 0.5);
        showStreamStatus('retrying', `${errDetail} — (${retryAttempt + 1}/${MAX_AUTO_RETRIES}) ${Math.round(delay / 1000)}s 后重试...`);
        setTimeout(() => {
          removeStreamStatus();
          streamAIResponse(retryAttempt + 1);
        }, delay);
        return;
      }

      // All retries exhausted or non-retryable: show error retry bar
      const lastUserMsg = [...conversation.messages].reverse().find(m => m.role === 'user');
      if (lastUserMsg) {
        lastFailedUserMsgId = lastUserMsg.id;
        showRetryBar(lastUserMsg.id, `${classified.userMessage} | ${errDetail}`);
      } else {
        UI.showToast(classified.userMessage, 'error');
      }

      Storage.saveConversation(conversation);
      isStreaming = false;
      streamAborted = false;
      streamStopRequested = false;
      currentAbortController = null;
      updateSendButton();
    },
  });
}

function handleStreamStopped(aiMsg) {
  try {
    if (aiMsg.content) {
      // Keep partial content
      updateAssistantBubble(aiMsg.id, aiMsg.content, false);
      // Add interrupted marker
      const wrapper = document.getElementById(`msg-${aiMsg.id}`);
      if (wrapper) {
        const contentEl = wrapper.querySelector('.message-content');
        if (contentEl && !contentEl.querySelector('.stream-interrupted')) {
          contentEl.insertAdjacentHTML('beforeend', '<span class="stream-interrupted">— 已停止</span>');
        }
      }
      if (editMvuMode) {
        processEditMvuResponse(aiMsg.content);
      } else {
        aiMsg.abstract = Summary.parseAbstract(aiMsg.content);
        processMvuFromResponse(aiMsg.content, aiMsg);
        processWritingAdvice(aiMsg.content);
        Storage.saveConversation(conversation);
      }
    } else {
      // No content, remove placeholder
      if (editMvuMode) {
        editMvuMessages = editMvuMessages.filter(m => m.id !== aiMsg.id);
      } else {
        conversation.messages = conversation.messages.filter(m => m.id !== aiMsg.id);
        Storage.saveConversation(conversation);
      }
      const el = document.getElementById(`msg-${aiMsg.id}`);
      if (el) el.remove();
    }
  } catch (e) {
    console.error('handleStreamStopped error:', e);
  }

  // Cleanup always runs
  isStreaming = false;
  streamAborted = false;
  streamStopRequested = false;
  currentAbortController = null;
  updateSendButton();
  // Re-show init confirmation if draft is ready
  if (pendingMvuInit && conversation.phase === 'init') {
    showMvuInitConfirmation();
  }
  UI.showToast('已停止生成', 'info');
}

function stopStreaming() {
  if (!currentAbortController || streamStopRequested) return;

  streamAborted = true;
  streamStopRequested = true;
  currentAbortController.abort();
  removeStreamStatus();
  updateSendButton();
}

// ============================================================
// Error Retry Bar
// ============================================================
function showRetryBar(userMsgId, errorMsg) {
  removeRetryBar();
  const msgEl = document.getElementById(`msg-${userMsgId}`);
  if (!msgEl) return;

  const bar = document.createElement('div');
  bar.className = 'error-retry-bar';
  bar.id = 'errorRetryBar';
  bar.innerHTML = `
    <span class="error-msg"><strong>发送失败</strong>: ${Utils.escapeHtml(errorMsg)}</span>
    <button class="btn btn-primary" onclick="retryLastMessage()">重试</button>
    <button class="btn btn-secondary" onclick="editAndRetry('${userMsgId}')">编辑后重试</button>
    <button class="btn btn-ghost" onclick="deleteFailedMessage('${userMsgId}')">删除</button>
  `;
  msgEl.after(bar);
  scrollToBottom(false);
}

function removeRetryBar() {
  const bar = document.getElementById('errorRetryBar');
  if (bar) bar.remove();
}

function retryLastMessage() {
  if (isStreaming) return;
  removeRetryBar();
  lastFailedUserMsgId = null;
  streamAIResponse(0);
}

function editAndRetry(userMsgId) {
  const msg = findMessage(userMsgId);
  if (!msg) return;

  editingMsgId = userMsgId;
  const overlay = document.getElementById('editOverlay');
  const textarea = document.getElementById('editTextarea');
  textarea.value = msg.content;
  overlay.classList.add('visible');

  // Override confirm to do retry after edit
  window._editRetryMode = true;
  setTimeout(() => textarea.focus(), 100);
}

function deleteFailedMessage(userMsgId) {
  removeRetryBar();
  lastFailedUserMsgId = null;

  conversation.messages = conversation.messages.filter(m => m.id !== userMsgId);
  Storage.saveConversation(conversation);
  const el = document.getElementById(`msg-${userMsgId}`);
  if (el) {
    el.style.transition = 'opacity 0.3s ease';
    el.style.opacity = '0';
    setTimeout(() => {
      el.remove();
      if (conversation.messages.length === 0) renderAllMessages();
    }, 300);
  }
}

function setupOfflineDetection() {
  const banner = document.getElementById('offlineBanner');
  const updateStatus = () => {
    if (!navigator.onLine) {
      banner.classList.add('visible');
      document.getElementById('inputArea').classList.add('disabled');
