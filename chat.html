// ============================================================
// Writing Advice Processing
// ============================================================
function processWritingAdvice(text) {
  const adviceData = MVU.parseWritingAdvice(text);
  if (!adviceData) return;

  const current = conversation.writingAdvice || '';

  if (adviceData.op === 'set') {
    conversation.writingAdvice = adviceData.content || '';
  } else if (adviceData.op === 'add' && Array.isArray(adviceData.items)) {
    const lines = current ? current.split('\n').filter(l => l.trim()) : [];
    lines.push(...adviceData.items.map(i => '- ' + i));
    conversation.writingAdvice = lines.join('\n');
  } else if (adviceData.op === 'remove' && Array.isArray(adviceData.items)) {
    let updated = current;
    for (const item of adviceData.items) {
      updated = updated.split('\n').filter(l => !l.includes(item)).join('\n');
    }
    conversation.writingAdvice = updated.trim();
  }

  UI.showToast('写作建议已更新', 'success');
}

// ============================================================
// MVU Processing
// ============================================================
function processMvuFromResponse(text, aiMsg) {
  if (conversation.phase === 'init') {
    const initData = MVU.parseInit(text);
    const updateData = MVU.parseMvuUpdate(text);
    const storySetting = MVU.parseStorySetting(text);

    let changed = false;

    if (initData) {
      // Full init (first time or full replacement)
      initData._storySetting = storySetting || (pendingMvuInit?._storySetting) || '';
      // If still no story_setting, scan earlier messages
      if (!initData._storySetting) {
        for (let k = conversation.messages.length - 1; k >= 0; k--) {
          const m = conversation.messages[k];
          if (m.role !== 'assistant' || !m.content) continue;
          const ss = MVU.parseStorySetting(m.content);
          if (ss) { initData._storySetting = ss; break; }
        }
      }
      pendingMvuInit = initData;
      changed = true;
    } else if (updateData && pendingMvuInit) {
      // Incremental update — merge changed fields into existing draft
      if (updateData.schema) pendingMvuInit.schema = updateData.schema;
      if (updateData.html) pendingMvuInit.html = updateData.html;
      if (updateData.css) pendingMvuInit.css = updateData.css;
      changed = true;
    }

    // Story setting: full replacement or incremental patch
    if (storySetting) {
      if (pendingMvuInit) {
        pendingMvuInit._storySetting = storySetting;
        changed = true;
      }
    } else {
      const storyPatch = MVU.parseStorySettingPatch(text);
      if (storyPatch && pendingMvuInit) {
        const existing = pendingMvuInit._storySetting || conversation.storySetting || '';
        pendingMvuInit._storySetting = MVU.applyStorySettingPatch(existing, storyPatch);
        changed = true;
        log('processMvuFromResponse: story_setting_patch applied', storyPatch.length, 'ops');
      }
    }

    if (changed && pendingMvuInit) {
      previewMvuInit();
      showMvuInitConfirmation();
      if (!pendingMvuInit._storySetting) {
        UI.showToast('注意：AI 未输出故事设定，建议要求补充', 'error');
      }
    }
  } else if (conversation.phase === 'rp') {
    // Check for mvu patch in response
    const patchData = MVU.parsePatch(text);
    if (patchData && conversation.mvu?.schema) {
      if (patchData.analysis) {
        log('[MVU Analysis]', patchData.analysis);
      }
      const container = document.getElementById('mvuContent');
      const changedFields = [];
      const patchList = Array.isArray(patchData) ? patchData : (patchData.patches || []);
      for (const p of patchList) {
        if (p.op === 'addFromTemplate') {
          const tpl = conversation.mvu.templates?.[p.template];
          if (tpl?.fields) changedFields.push(...Object.keys(tpl.fields).map(k => `${p.id}_${k}`));
        } else if (p.op === 'removeFromTemplate') {
          changedFields.push(p.id);
        } else if (p.path) {
          changedFields.push(String(p.path).replace(/^\//, '').split('/')[0]);
        }
      }
      // Handle template ops first (addFromTemplate / removeFromTemplate)
      MVU.applyTemplateOps(conversation.mvu, patchData, container);
      // Then apply regular patches
      conversation.mvu.state = MVU.applyPatch(conversation.mvu.state, patchData);
      const normalized = normalizeMvuStructure(changedFields.length ? changedFields : ['characters', 'main_quests', 'side_quests']);
      markMvuFieldsChanged(changedFields);
      // Snapshot state onto the AI message for revert
      if (aiMsg) {
        aiMsg.mvuSnapshot = JSON.parse(JSON.stringify(conversation.mvu.state));
        aiMsg.templateSnapshot = JSON.parse(JSON.stringify(conversation.mvu.templateInstances || []));
      }
      Storage.saveConversation(conversation);
      // Update DOM
      if (mvuViewMode === 'data') {
        MVU.renderDataView(container, conversation.mvu, { query: mvuSearchQuery });
      } else if (normalized.changed) {
        renderMvuSidebar();
      } else {
        MVU.updateDOM(container, conversation.mvu.state, conversation.mvu.schema, conversation.mvu._changedFields || []);
        MVUInteraction.enhance(container, conversation.mvu);
      }
      renderMvuToolbar();
    }
  }
}

function showMvuInitConfirmation() {
  // Remove any existing confirm bar
  const existing = document.querySelector('.mvu-confirm-bar');
  if (existing) existing.remove();

  if (!pendingMvuInit || isStreaming) return;

  const list = document.getElementById('messagesList');
  const bar = document.createElement('div');
  bar.className = 'mvu-confirm-bar';
  const hasStory = pendingMvuInit?._storySetting ? true : false;
  bar.innerHTML = `
    <p>AI 已生成${hasStory ? '故事设定 + ' : ''}状态栏${!hasStory ? ' <span style="color:var(--danger);">(缺少故事设定)</span>' : ''}。确认后进入RP，或继续修改。</p>
    <button class="btn btn-secondary" onclick="rejectMvuInit()">放弃草稿</button>
    <button class="btn btn-primary" onclick="confirmMvuInit()">确认开始RP</button>
  `;
  list.appendChild(bar);
  scrollToBottom(false);
}

function previewMvuInit() {
  if (!pendingMvuInit) return;

  // Build temporary MVU data for preview
  const tempMvu = {
    schema: pendingMvuInit.schema,
    state: {},
    html: pendingMvuInit.html,
    css: pendingMvuInit.css,
    templates: pendingMvuInit.templates || {},
    templateInstances: [],
  };

  // Initialize state from schema
  if (pendingMvuInit.schema) {
    for (const [key, def] of Object.entries(pendingMvuInit.schema)) {
      if (def.value !== undefined) {
        tempMvu.state[key] = def.value;
      } else if (def.type === 'list') {
        tempMvu.state[key] = [];
      } else if (def.type === 'number' || def.type === 'bar') {
        tempMvu.state[key] = def.max || 100;
      } else {
        tempMvu.state[key] = '';
      }
    }
  }

  // Render preview in sidebar
  const container = document.getElementById('mvuContent');
  MVU.render(container, tempMvu);

  // Open sidebar if closed
  if (!sidebarOpen) toggleSidebar();

  UI.showToast('预览模式 - 确认后生效', 'info');
}

function confirmMvuInit() {
  if (!pendingMvuInit) return;

  // Apply MVU init
  conversation.mvu = {
    schema: pendingMvuInit.schema,
    state: {},
    html: pendingMvuInit.html,
    css: pendingMvuInit.css,
    templates: pendingMvuInit.templates || {},
    templateInstances: [],
  };

  // Initialize state from schema defaults
  if (pendingMvuInit.schema) {
    for (const [key, def] of Object.entries(pendingMvuInit.schema)) {
      if (def.value !== undefined) {
        conversation.mvu.state[key] = def.value;
      } else if (def.type === 'list') {
        conversation.mvu.state[key] = [];
      } else if (def.type === 'number' || def.type === 'bar') {
        conversation.mvu.state[key] = def.max || 100;
      } else {
        conversation.mvu.state[key] = '';
      }
    }
  }
  normalizeMvuStructure(['characters', 'main_quests', 'side_quests']);

  // Save story setting
  if (pendingMvuInit._storySetting) {
    conversation.storySetting = pendingMvuInit._storySetting;
  }

  // Ensure summary
  if (!conversation.summary) {
    const settings = Storage.getSettings();
    conversation.summary = { mergedSummaries: [], lastMergedIdx: 0, interval: settings.summaryInterval || 100 };
  }

  // Clear init-phase messages
  conversation.messages = [];

  // Switch to RP phase
  conversation.phase = 'rp';
  Storage.saveConversation(conversation);

  // Update UI
  renderPhaseBadge();
  renderMvuSidebar();
  renderAllMessages();

  // Open sidebar to show new panel
  if (!sidebarOpen) toggleSidebar();

  // Remove confirmation bar
  const bar = document.querySelector('.mvu-confirm-bar');
  if (bar) bar.remove();

  pendingMvuInit = null;
  UI.showToast('状态面板已初始化，故事正式开始！', 'success');
}

function rejectMvuInit() {
  pendingMvuInit = null;

  // Reset sidebar preview
  renderMvuSidebar();

  const bar = document.querySelector('.mvu-confirm-bar');
  if (bar) bar.remove();
  UI.showToast('已取消，请继续讨论设定', 'info');
}

// ============================================================
// Big Summary
// ============================================================
let _isMerging = false;
async function checkBigSummaryTrigger() {
  if (_isMerging) return;
  if (!Summary.shouldTriggerMerge(conversation)) return;

  _isMerging = true;
  const unmergedCount = Summary.countUnmergedAbstracts(conversation);
  log('Triggering summary merge, unmerged abstracts:', unmergedCount);
  UI.showToast(`正在合并 ${unmergedCount} 条摘要...`, 'info');

  try {
    const result = await Summary.generateMergeSummary(conversation);
    if (result) {
      conversation.summary = {
        ...conversation.summary,
        mergedSummaries: result.mergedSummaries,
        lastMergedIdx: result.lastMergedIdx,
      };
      Storage.saveConversation(conversation);
      renderSummaryPanel();
      UI.showToast(`摘要已合并为 ${result.mergedSummaries.length} 条总结`, 'success');
    }
  } catch (e) {
    log('Summary merge failed:', e);
    UI.showToast('摘要合并失败', 'error');
  } finally {
    _isMerging = false;
  }
}

// ============================================================
// Message Actions
// ============================================================
function findMessage(msgId) {
  return conversation.messages.find(m => m.id === msgId);
}

function copyToClipboard(text) {
  // Modern API (works on HTTPS / localhost)
  if (navigator.clipboard?.writeText) {
    return navigator.clipboard.writeText(text).then(() => true).catch(() => false);
  }
  return Promise.resolve(false);
}

function copyFallback(text) {
  // Fallback for non-secure contexts (HTTP on mobile)
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;left:-9999px;top:-9999px;opacity:0;';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  let ok = false;
  try { ok = document.execCommand('copy'); } catch {}
  ta.remove();
  return ok;
}

function copyMessage(msgId) {
  const msg = findMessage(msgId);
  if (!msg) return;

  const textToCopy = msg.role === 'assistant'
    ? Summary.cleanAbstract(MVU.cleanText(msg.content))
    : msg.content;

  const onSuccess = () => {
    UI.showToast('已复制到剪贴板', 'success');
    const el = document.getElementById(`msg-${msgId}`);
    if (el) {
      el.classList.add('copy-flash');
      setTimeout(() => el.classList.remove('copy-flash'), 600);
    }
  };

  copyToClipboard(textToCopy).then(ok => {
    if (ok) { onSuccess(); return; }
    // Fallback
    if (copyFallback(textToCopy)) { onSuccess(); }
    else { UI.showToast('复制失败', 'error'); }
  });
}

function retryMessage(msgId) {
  if (isStreaming) return;
  const msgIdx = conversation.messages.findIndex(m => m.id === msgId);
  if (msgIdx < 0) return;
  const msg = conversation.messages[msgIdx];
  if (msg.role !== 'user') return;

  // Check what's after this user message
  const afterMessages = conversation.messages.slice(msgIdx + 1);

  if (afterMessages.length === 0) {
    // Nothing after — just re-send
    streamAIResponse();
  } else if (afterMessages.length === 1 && afterMessages[0].role === 'assistant') {
    // Single AI reply right after — remove it and re-send
    const aiMsg = afterMessages[0];
    const el = document.getElementById(`msg-${aiMsg.id}`);
    if (el) el.remove();
    conversation.messages = conversation.messages.filter(m => m.id !== aiMsg.id);
    Storage.saveConversation(conversation);
    streamAIResponse();
  } else {
    // Multiple turns after — revert to this user message then re-send
    conversation.messages = conversation.messages.slice(0, msgIdx + 1);

    // Restore MVU snapshot from nearest earlier AI message
    let snapshot = null;
    for (let i = msgIdx; i >= 0; i--) {
      const m = conversation.messages[i];
      if (m.role === 'assistant' && m.mvuSnapshot) {
        snapshot = { state: m.mvuSnapshot, templates: m.templateSnapshot || [] };
        break;
      }
    }
    if (snapshot) {
      conversation.mvu.state = JSON.parse(JSON.stringify(snapshot.state));
      conversation.mvu.templateInstances = JSON.parse(JSON.stringify(snapshot.templates));
    }

    if (conversation.summary && conversation.summary.lastMergedIdx > conversation.messages.length) {
      conversation.summary.lastMergedIdx = conversation.messages.length;
    }

    Storage.saveConversation(conversation);
    renderAllMessages();
    renderMvuSidebar();
    streamAIResponse();
  }
}

function editMessage(msgId) {
  const msg = findMessage(msgId);
  if (!msg) return;

  editingMsgId = msgId;
  const overlay = document.getElementById('editOverlay');
  const textarea = document.getElementById('editTextarea');
  textarea.value = msg.content;

  // Show "保存并重新发送" only for user messages
  const resendBtn = document.getElementById('editResendBtn');
  resendBtn.style.display = msg.role === 'user' ? '' : 'none';

  overlay.classList.add('visible');
  setTimeout(() => textarea.focus(), 100);
}

function closeEdit() {
  editingMsgId = null;
  window._editRetryMode = false;
  document.getElementById('editOverlay').classList.remove('visible');
}

function confirmEdit() {
  if (!editingMsgId) return;
  const msg = findMessage(editingMsgId);
  if (!msg) return;

  const textarea = document.getElementById('editTextarea');
  const newContent = textarea.value.trim();
  if (!newContent) return;

  msg.content = newContent;

  // Re-parse abstract if assistant message
  if (msg.role === 'assistant') {
    msg.abstract = Summary.parseAbstract(newContent);
  }

  Storage.saveConversation(conversation);

  // Re-render the specific message
  const el = document.getElementById(`msg-${editingMsgId}`);
  if (el) {
    const idx = conversation.messages.indexOf(msg);
    const newEl = createMessageElement(msg, idx);
    el.replaceWith(newEl);
  }

  const wasRetryMode = window._editRetryMode;
  window._editRetryMode = false;

  closeEdit();

  if (wasRetryMode) {
    // After editing a failed message, retry sending
    removeRetryBar();
    lastFailedUserMsgId = null;
    UI.showToast('消息已修改，正在重新发送', 'info');
    streamAIResponse(0);
  } else {
    UI.showToast('消息已更新', 'success');
  }
}

function confirmEditAndResend() {
  if (!editingMsgId) return;
  const msg = findMessage(editingMsgId);
  if (!msg || msg.role !== 'user') return;

  const textarea = document.getElementById('editTextarea');
  const newContent = textarea.value.trim();
  if (!newContent) return;

  // Save the edit
  msg.content = newContent;
  Storage.saveConversation(conversation);

  // Re-render the message
  const el = document.getElementById(`msg-${editingMsgId}`);
  if (el) {
    const idx = conversation.messages.indexOf(msg);
    const newEl = createMessageElement(msg, idx);
    el.replaceWith(newEl);
  }

  const savedMsgId = editingMsgId;
  closeEdit();

  // Trigger retry on the edited message
  retryMessage(savedMsgId);
}

function toggleHideMessage(msgId) {
  const msg = findMessage(msgId);
  if (!msg) return;

  msg.hidden = !msg.hidden;
  Storage.saveConversation(conversation);

  // Re-render the message
  const el = document.getElementById(`msg-${msgId}`);
  if (el) {
    const idx = conversation.messages.indexOf(msg);
    const newEl = createMessageElement(msg, idx);
    el.replaceWith(newEl);
  }

  UI.showToast(msg.hidden ? '消息已隐藏（不会发送给AI）' : '消息已恢复', 'info');
}

function deleteMessage(msgId) {
  UI.showConfirm({
    title: '删除消息',
    message: '确定要删除这条消息吗？此操作无法撤销。',
    onConfirm: () => {
      conversation.messages = conversation.messages.filter(m => m.id !== msgId);
      Storage.saveConversation(conversation);

      const el = document.getElementById(`msg-${msgId}`);
      if (el) {
        el.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
        el.style.opacity = '0';
        el.style.transform = 'translateY(-10px)';
        setTimeout(() => {
          el.remove();
          // Show empty state if no messages left
          if (conversation.messages.length === 0) {
            renderAllMessages();
          }
        }, 300);
      }
    },
  });
}

// Restart & Revert
// ============================================================

function restartGame() {
  if (conversation.phase !== 'rp') return;
  UI.showConfirm({
    title: '重新开始',
    message: '确定要重新开始吗？所有对话和状态将重置，但世界设定和状态栏结构保留。',
    onConfirm: () => {
      // Reset state from schema defaults
      if (conversation.mvu?.schema) {
        const newState = {};
        for (const [key, def] of Object.entries(conversation.mvu.schema)) {
          if (def.value !== undefined) {
            newState[key] = JSON.parse(JSON.stringify(def.value));
          } else if (def.type === 'list') {
            newState[key] = [];
          } else if (def.type === 'number' || def.type === 'bar') {
            newState[key] = def.max || 100;
          } else {
            newState[key] = '';
          }
        }
        conversation.mvu.state = newState;
      }
      // Clear template instances
      conversation.mvu.templateInstances = [];
      // Clear messages
      conversation.messages = [];
      // Reset summary
      const settings = Storage.getSettings();
      conversation.summary = { mergedSummaries: [], lastMergedIdx: 0, interval: settings.summaryInterval || 100 };
      // Save
      Storage.saveConversation(conversation);
      // Refresh UI
      renderAllMessages();
      renderMvuSidebar();
      // Clear options bar
      const optBar = document.getElementById('optionsBar');
      if (optBar) { optBar.style.display = 'none'; optBar.innerHTML = ''; }
      _optionActions = [];
      UI.showToast('游戏已重新开始', 'success');
    },
  });
}

function revertToMessage(msgId) {
  const targetIdx = conversation.messages.findIndex(m => m.id === msgId);
  if (targetIdx < 0) return;

  UI.showConfirm({
    title: '回档',
    message: '确定要回档到这条消息吗？之后的所有对话将被删除。',
    onConfirm: () => {
      // Truncate messages
      conversation.messages = conversation.messages.slice(0, targetIdx + 1);

      // Find the target or nearest earlier AI message with mvuSnapshot
      let snapshot = null;
      for (let i = targetIdx; i >= 0; i--) {
        const m = conversation.messages[i];
        if (m.role === 'assistant' && m.mvuSnapshot) {
          snapshot = { state: m.mvuSnapshot, templates: m.templateSnapshot || [] };
          break;
        }
      }

      if (snapshot) {
        conversation.mvu.state = JSON.parse(JSON.stringify(snapshot.state));
        conversation.mvu.templateInstances = JSON.parse(JSON.stringify(snapshot.templates));
      } else if (conversation.mvu?.schema) {
        // No snapshot found (old messages) — reset to schema defaults
        const newState = {};
        for (const [key, def] of Object.entries(conversation.mvu.schema)) {
          if (def.value !== undefined) {
            newState[key] = JSON.parse(JSON.stringify(def.value));
          } else if (def.type === 'list') {
            newState[key] = [];
          } else if (def.type === 'number' || def.type === 'bar') {
            newState[key] = def.max || 100;
          } else {
            newState[key] = '';
          }
        }
        conversation.mvu.state = newState;
        conversation.mvu.templateInstances = [];
      }

      // Trim summary: lastMergedIdx should not exceed message count
      if (conversation.summary) {
        if (conversation.summary.lastMergedIdx > conversation.messages.length) {
          conversation.summary.lastMergedIdx = conversation.messages.length;
        }
        // Remove merged summaries that reference messages beyond the new range
        // (mergedSummaries are cumulative, keep them all — they summarize earlier content)
      }

      // Save + refresh
      Storage.saveConversation(conversation);
      renderAllMessages();
      renderMvuSidebar();
      // Restore options from last AI message after revert
      const lastAi = [...conversation.messages].reverse().find(m => m.role === 'assistant');
      if (lastAi) { renderOptionsBar(lastAi.content); } else {
        const optBar = document.getElementById('optionsBar');
        if (optBar) { optBar.style.display = 'none'; optBar.innerHTML = ''; }
        _optionActions = [];
      }
      UI.showToast('已回档', 'success');
    },
  });
}

// ============================================================
// iOS Keyboard Dismiss Fix
// ============================================================
function setupIOSKeyboardFix() {
  if (!window.visualViewport) return;
  let prevHeight = window.visualViewport.height;
  window.visualViewport.addEventListener('resize', () => {
    const h = window.visualViewport.height;
    // Keyboard dismissed: viewport grew significantly
    if (h - prevHeight > 50) {
      window.scrollTo(0, 0);
    }
    prevHeight = h;
  });
}

// ============================================================
// Scroll Management
// ============================================================
function setupScrollDetection() {
  const area = document.getElementById('messagesArea');
  area.addEventListener('scroll', () => {
    const threshold = 80;
    const atBottom = area.scrollHeight - area.scrollTop - area.clientHeight < threshold;
    userScrolledUp = !atBottom;

    const btn = document.getElementById('scrollBottomBtn');
    if (userScrolledUp) {
      btn.classList.add('visible');
    } else {
      btn.classList.remove('visible');
    }
  });

  // Mobile: tap message bubble to toggle action buttons
  const isMobile = window.matchMedia('(max-width: 768px)').matches;
  if (isMobile) {
    area.addEventListener('click', (e) => {
      // Recognize both user (.message-bubble) and AI (.message-content) messages
      const target = e.target.closest('.message-bubble') || e.target.closest('.message-content');
      const msg = target && target.closest('.message');
      if (!msg) {
        // Tapped outside any message: hide all
        area.querySelectorAll('.message.show-actions').forEach(el => el.classList.remove('show-actions'));
        return;
      }
      // Toggle this message, hide others
      const wasShown = msg.classList.contains('show-actions');
      area.querySelectorAll('.message.show-actions').forEach(el => el.classList.remove('show-actions'));
      if (!wasShown) msg.classList.add('show-actions');
    });
  }
}

function scrollToBottom(force) {
  if (!force && userScrolledUp) return;

  const area = document.getElementById('messagesArea');
  requestAnimationFrame(() => {
    area.scrollTop = area.scrollHeight;
  });
}

// ============================================================
// Prompt Debug Inspector
// ============================================================
function showPromptDebug() {
  // Toggle off if already open
  const existing = document.getElementById('debugOverlay');
  if (existing) { closeDebug(); return; }

  if (!conversation) return;
  const { systemPrompt, messages } = _lastBuiltPrompt || PromptBuilder.buildMessages(conversation);
  const THRESHOLD = 200;

  function msgBlock(role, content, idx) {
    const labels = { assistant: 'AI', user: 'USER', system: 'SYS' };
    const roleLabel = labels[role] || role.toUpperCase();
    const roleClass = role === 'assistant' ? 'ai' : role === 'system' ? 'sys' : 'user';
    const len = content.length;
    const isLong = len > THRESHOLD;
    const firstLine = content.split('\n')[0].substring(0, 60);
    const preview = firstLine + (firstLine.length < content.split('\n')[0].length ? '...' : '');
    const idxStr = idx !== null ? '#' + idx + ' · ' : '';

    return `<div class="debug-message">
      <div class="debug-msg-header" onclick="this.nextElementSibling.classList.toggle('collapsed')">
        <span class="debug-role debug-role-${roleClass}">${roleLabel}</span>
        <span class="debug-msg-meta">${idxStr}${len}字</span>
        <span class="debug-preview">${Utils.escapeHtml(preview)}</span>
      </div>
      <pre class="debug-pre${isLong ? ' collapsed' : ''}">${Utils.escapeHtml(content)}</pre>
    </div>`;
  }

  const overlay = document.createElement('div');
  overlay.id = 'debugOverlay';
  overlay.className = 'debug-overlay';

  overlay.innerHTML = `<div class="debug-modal">
    <div class="debug-header">
      <span class="debug-title">Prompt Inspector</span>
      <button class="btn-icon" onclick="closeDebug()" style="width:28px;height:28px;">
        <span class="icon" style="width:16px;height:16px;">${Icons.close}</span>
      </button>
    </div>
    <div class="debug-body">
      <div class="debug-section">
        <div class="debug-section-header"><span>System Prompt</span><span class="debug-badge">${systemPrompt.length}字</span></div>
        ${msgBlock('system', systemPrompt, null)}
      </div>
      <div class="debug-section">
        <div class="debug-section-header"><span>Messages</span><span class="debug-badge">${messages.length}条</span></div>
        ${messages.map((m, i) => msgBlock(m.role, m.content, i + 1)).join('')}
      </div>
    </div>
  </div>`;

  document.body.appendChild(overlay);
  requestAnimationFrame(() => overlay.classList.add('visible'));
}

function closeDebug() {
  const el = document.getElementById('debugOverlay');
  if (el) {
    el.classList.remove('visible');
    setTimeout(() => el.remove(), 200);
  }
}

// Edit MVU Mode
// ============================================================
function enterEditMvuMode() {
  if (editMvuMode || isStreaming) return;
  if (conversation.phase !== 'rp' || !conversation.mvu) {
    UI.showToast('只有在 RP 阶段才能编辑状态栏', 'info');
    return;
  }

  editMvuMode = true;
  editMvuMessages = [];
  editMvuBackup = {
    mvu: JSON.parse(JSON.stringify(conversation.mvu)),
    storySetting: conversation.storySetting || '',
  };

  // Close sidebars
  closeAnySidebar();

  // Clear message display
  const list = document.getElementById('messagesList');
  list.innerHTML = `
    <div class="empty-state">
      <div class="empty-state-icon">${Icons.edit}</div>
      <h3>状态栏编辑模式</h3>
      <p>描述你想对状态栏或故事设定做的修改，可以和 AI 进行多轮对话。</p>
    </div>`;

  // Show edit mode bar
  document.getElementById('editModeBar').style.display = 'flex';

  // Update input placeholder
  document.getElementById('inputTextarea').placeholder = '描述你想修改的内容...';

  // Update phase badge
  const badge = document.getElementById('phaseBadge');
  badge.textContent = 'EDIT';
  badge.className = 'phase-badge init';

  // Open sidebar to show live preview
  if (!sidebarOpen) toggleSidebar();

  // Hide options bar
  clearOptionsBar();

  log('enterEditMvuMode', { mvuKeys: Object.keys(conversation.mvu.state || {}) });
}

function exitEditMvuMode(apply) {
  if (!editMvuMode) return;
  if (isStreaming) {
    UI.showToast('Please wait for AI to finish', 'info');
    return;
  }

  if (apply) {
    // Keep current mvu state (already updated via processEditMvuResponse)
    Storage.saveConversation(conversation);
    UI.showToast('Changes applied', 'success');
    log('exitEditMvuMode: applied', { schema: !!conversation.mvu.schema });
  } else {
    // Rollback from backup
    if (editMvuBackup) {
      conversation.mvu = editMvuBackup.mvu;
      conversation.storySetting = editMvuBackup.storySetting;
      Storage.saveConversation(conversation);
    }
    UI.showToast('Changes discarded', 'info');
    log('exitEditMvuMode: discarded');
  }

  editMvuMode = false;
  editMvuMessages = [];
  editMvuBackup = null;

  // Hide edit mode bar
  document.getElementById('editModeBar').style.display = 'none';

  // Restore input placeholder
  document.getElementById('inputTextarea').placeholder = '写下你的行动...';

  // Restore phase badge
  renderPhaseBadge();

  // Re-render main chat and sidebar
  renderAllMessages();
  renderMvuSidebar();

  // Restore last options if any
  const lastAiMsg = [...conversation.messages].reverse().find(m => m.role === 'assistant');
  if (lastAiMsg) renderOptionsBar(lastAiMsg.content);
}

function buildEditMvuPrompt() {
  const settings = Storage.getSettings();

  // Build system prompt: edit instructions + current data
  let systemPrompt = `你是"小克"，用户专属的互动小说创作搭档。

---
【当前阶段：状态栏/背景编辑模式】
当前游戏已暂停，玩家提出了状态栏或背景设定的修改请求。

你需要根据玩家的需要对状态栏结构和/或故事设定进行更新。
- 不要随意修改目前变量的值，除非玩家明确要求
- 可以修改的内容包括：schema字段定义、HTML模板、CSS样式、templates模板定义、故事设定
- 回复中用自然语言解释你做了什么修改

如果需要修改状态栏，请输出：
\`\`\`json:mvu_update
{ "schema": {...}, "state": {...}, "html": "...", "css": "...", "templates": {...}, "patches": [...] }
\`\`\`
其中只包含需要修改的字段，不需要修改的可以省略。
如果只是修改已有变量的当前值，优先输出 state 或 patches；如果修改布局/样式才输出 html/css。

状态栏结构同步规则（必须遵守）：
- 新增、删除、重命名、重组字段时，必须同时更新 schema/state/html，必要时更新 css
- 新字段必须在 html 中用 data-field、data-field-list 或 data-field-bar 绑定，不能只写入 state
- 不要把 templates、templateInstances、schema、html、css 等内部字段展示到美化视图
- main_quests 必须归入主线任务区；side_quests 必须归入支线任务区；characters 必须归入角色区
- 角色必须统一写入 characters 数组；不要再创建 guangu_profile、tangyouyou_profile 这类独立角色字段
- HTML 角色区必须使用 data-field-list="characters"，让系统自动渲染所有角色卡片，不要只写死某一个角色面板
- 同一核心区只能存在一个：角色档案、主线任务、支线任务、物品/技能区都不要重复创建
- 不要写死角色、任务、物品列表的正文内容；展示内容必须来自 state 绑定
- 美化视图要保持精美布局和点击详情交互，不要输出“新增同步”“自动同步”等调试区块

templates（模板）用于RP阶段动态添加新角色/NPC等。定义格式：
"模板名": {
  "fields": { "字段名": { "type": "类型", "label": "显示名", "max": 100 } },
  "html": "面板HTML片段，用 \${id} 和 \${name} 占位，根元素加 data-tpl-id=\\"\${id}\\"，字段用 data-field=\\"\${id}_字段名\\" 绑定",
  "container": "面板插入容器的CSS选择器",
  "tabContainer": "Tab按钮栏的CSS选择器（设置后系统自动创建Tab按钮和切换）"
}
HTML中需放置对应容器元素，如 <div class="mvu-tabs" id="xxx-tabs"></div> 和 <div id="xxx-panels"></div>。

如果需要修改故事设定，可以选择全量替换或增量更新：

方式1 - 全量替换（适合大改）：
\`\`\`text:story_setting
完整的新故事设定内容
\`\`\`

方式2 - 增量更新（推荐，适合局部修改）：
\`\`\`json:story_setting_patch
[
  {"op": "replace", "section": "章节标题", "content": "新的章节内容"},
  {"op": "append", "content": "追加到末尾的新内容"},
  {"op": "delete", "section": "要删除的章节标题"}
]
\`\`\`
其中 section 对应故事设定中的 ## 或 ### 标题。优先使用增量更新以节省输出。`;

  // Append current MVU data
  systemPrompt += '\n\n---\n【当前状态栏数据】\n';
  if (conversation.mvu) {
    systemPrompt += 'Schema:\n```json\n' + JSON.stringify(conversation.mvu.schema, null, 2) + '\n```\n\n';
    systemPrompt += 'State:\n```json\n' + JSON.stringify(conversation.mvu.state, null, 2) + '\n```\n\n';
    if (conversation.mvu.templates && Object.keys(conversation.mvu.templates).length > 0) {
      systemPrompt += 'Templates:\n```json\n' + JSON.stringify(conversation.mvu.templates, null, 2) + '\n```\n\n';
    }
    systemPrompt += 'HTML:\n```html\n' + (conversation.mvu.html || '') + '\n```\n\n';
    systemPrompt += 'CSS:\n```css\n' + (conversation.mvu.css || '') + '\n```\n';
  }

  if (conversation.storySetting) {
    systemPrompt += '\n---\n【当前故事设定】\n' + conversation.storySetting + '\n';
  }

  // Build messages: clean code blocks from previous AI messages
  const messages = [];
  for (const msg of editMvuMessages) {
    if (msg.role === 'assistant') {
      // Clean code blocks from previous AI messages to save context
      let cleaned = msg.content;
      cleaned = cleaned.replace(/```json:mvu_update\s*\n[\s\S]*?\n```/g, '[mvu_update applied]');
      cleaned = cleaned.replace(/```text:story_setting\s*\n[\s\S]*?\n```/g, '[story_setting applied]');
      cleaned = cleaned.replace(/```json:story_setting_patch\s*\n[\s\S]*?\n```/g, '[story_setting_patch applied]');
      messages.push({ role: 'assistant', content: cleaned });
    } else {
      messages.push({ role: msg.role, content: msg.content });
    }
  }

  log('buildEditMvuPrompt', { systemLen: systemPrompt.length, msgCount: messages.length });
  return { systemPrompt, messages };
}

function processEditMvuResponse(text) {
  if (!text || !conversation.mvu) return;

  let changed = false;
  let shouldWarnMvuBinding = false;
  let bindingCheckFields = [];

  // Parse mvu_update
  const updateData = MVU.parseMvuUpdate(text);
  if (updateData) {
    const changedFields = [];
    if (updateData.schema) {
      // Merge into existing schema (AI only sends modified fields)
      for (const [key, def] of Object.entries(updateData.schema)) {
        conversation.mvu.schema[key] = def;
        changedFields.push(key);
        // Initialize state only for genuinely new fields
        if (conversation.mvu.state[key] === undefined) {
          if (def.value !== undefined) {
            conversation.mvu.state[key] = def.value;
          } else if (def.type === 'list') {
            conversation.mvu.state[key] = [];
          } else if (def.type === 'number' || def.type === 'bar') {
            conversation.mvu.state[key] = def.max || 100;
          } else {
            conversation.mvu.state[key] = '';
          }
        }
      }
    }
    if (updateData.state) {
      for (const [key, value] of Object.entries(updateData.state)) {
        conversation.mvu.state[key] = value;
        changedFields.push(key);
      }
    }
    if (Array.isArray(updateData.patches)) {
      conversation.mvu.state = MVU.applyPatch(conversation.mvu.state, { patches: updateData.patches });
      for (const p of updateData.patches) {
        if (p.path) changedFields.push(String(p.path).replace(/^\//, '').split('/')[0]);
      }
    }
    if (updateData.html) conversation.mvu.html = updateData.html;
    if (updateData.css) conversation.mvu.css = updateData.css;
    if (updateData.templates) {
      if (!conversation.mvu.templates) conversation.mvu.templates = {};
      Object.assign(conversation.mvu.templates, updateData.templates);
    }
    const normalized = normalizeMvuStructure(changedFields.length ? changedFields : ['characters', 'main_quests', 'side_quests']);
    if (normalized.repaired.length) log('processEditMvuResponse: repaired visual bindings', normalized.repaired);
    shouldWarnMvuBinding = changedFields.length > 0;
    bindingCheckFields = changedFields;
    if (changedFields.length) markMvuFieldsChanged(changedFields);
    changed = true;
    log('processEditMvuResponse: mvu_update applied', { schema: !!updateData.schema, state: !!updateData.state, patches: Array.isArray(updateData.patches), html: !!updateData.html, css: !!updateData.css, templates: !!updateData.templates });
  } else {
    const patchData = MVU.parsePatch(text);
    if (patchData) {
      const container = document.getElementById('mvuContent');
      MVU.applyTemplateOps(conversation.mvu, patchData, container);
      conversation.mvu.state = MVU.applyPatch(conversation.mvu.state, patchData);
      const changedFields = [];
      for (const p of patchData.patches || []) {
        if (p.path) changedFields.push(String(p.path).replace(/^\//, '').split('/')[0]);
      }
      const normalized = normalizeMvuStructure(changedFields.length ? changedFields : ['characters', 'main_quests', 'side_quests']);
      if (normalized.repaired.length) log('processEditMvuResponse: repaired patch visual bindings', normalized.repaired);
      shouldWarnMvuBinding = changedFields.length > 0;
      bindingCheckFields = changedFields;
      if (changedFields.length) markMvuFieldsChanged(changedFields);
      changed = true;
      log('processEditMvuResponse: json:mvu patches applied', changedFields);
    }
  }

  // Parse story_setting (full replacement or incremental patch)
  const storySetting = MVU.parseStorySetting(text);
  if (storySetting) {
    conversation.storySetting = storySetting;
    changed = true;
    log('processEditMvuResponse: story_setting replaced');
  } else {
    const storyPatch = MVU.parseStorySettingPatch(text);
    if (storyPatch) {
      conversation.storySetting = MVU.applyStorySettingPatch(conversation.storySetting || '', storyPatch);
      changed = true;
      log('processEditMvuResponse: story_setting_patch applied', storyPatch.length, 'ops');
    }
  }

  // Live preview in sidebar
  if (changed) {
    renderMvuSidebar();
    if (shouldWarnMvuBinding) warnUnboundMvuFields('编辑已应用，但美化视图仍缺少绑定', bindingCheckFields);
    if (!sidebarOpen) toggleSidebar();
  }
}

// ============================================================
// Keyboard Shortcuts
// ============================================================
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    const debugOpen = document.getElementById('debugOverlay');
    const mvuDetailOpen = document.getElementById('mvuDetailOverlay')?.classList.contains('visible');
    if (mvuDetailOpen) {
      closeMvuDetail();
    } else if (debugOpen) {
      closeDebug();
    } else if (editingMsgId) {
      closeEdit();
    } else if (summaryPanelOpen) {
      toggleSummaryPanel();
    } else if (sidebarOpen) {
      toggleSidebar();
    }
  }
});
