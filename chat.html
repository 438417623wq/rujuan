<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="入卷">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0a0f">
  <title>入卷</title>
  <link rel="icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <script>if('serviceWorker' in navigator && location.protocol !== 'file:') navigator.serviceWorker.register('/sw.js');</script>
  <script src="common.js?v=14"></script>
  <style>
    /* ============================================================
       Chat Page - Complete Layout
       ============================================================ */
    .chat-app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      width: 100%;
    }

    /* ---- Top Bar ---- */
    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: calc(10px + env(safe-area-inset-top, var(--sat, 0px))) 16px 10px;
      background: var(--bg-glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 250;
    }
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .topbar-center {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-width: 0;
    }
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Topbar dropdown menu */
    .topbar-dropdown {
      position: relative;
      display: inline-flex;
    }
    .topbar-menu {
      display: none;
      position: fixed;
      top: auto;
      right: 16px;
      min-width: 200px;
      background: var(--bg-surface);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-lg);
      box-shadow: 0 12px 40px rgba(0,0,0,.5);
      z-index: 300;
      padding: 6px;
      max-height: 70vh;
      overflow-y: auto;
    }
    .topbar-menu.show { display: block; }
    .topbar-menu-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      white-space: nowrap;
      transition: all .15s;
      border-radius: var(--radius);
    }
    .topbar-menu-item:hover { background: var(--accent-dim); color: var(--text-primary); }
    .topbar-menu-item.active { color: var(--accent); }
    .topbar-menu-item .menu-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      opacity: 0.7;
    }
    .topbar-menu-item:hover .menu-icon { opacity: 1; }
    .topbar-menu-item.active .menu-icon { opacity: 1; }
    .topbar-menu-divider {
      height: 1px;
      background: var(--border);
      margin: 4px 8px;
    }
    .topbar-menu-label {
      padding: 8px 12px 4px;
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    /* World Setting Modal */
    .world-setting-overlay {
      position: fixed;
      inset: 0;
      z-index: 9000;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .world-setting-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }
    .world-setting-modal {
      background: var(--bg-surface);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-lg);
      width: 92%;
      max-width: 680px;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 16px 48px rgba(0,0,0,.5);
    }
    .world-setting-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .world-setting-title {
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 600;
      color: var(--accent);
    }
    .world-setting-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
    }
    .world-setting-body textarea {
      min-height: 300px;
      resize: vertical;
      line-height: 1.6;
      font-size: 13px;
    }
    .world-setting-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-shrink: 0;
    }

    /* Story title - editable inline input */
    .story-title {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 600;
      color: var(--accent);
      background: none;
      border: none;
      text-align: center;
      outline: none;
      max-width: 320px;
      width: 100%;
      padding: 2px 8px;
      border-radius: var(--radius);
      transition: all var(--transition);
      cursor: pointer;
      text-overflow: ellipsis;
      overflow: hidden;
      white-space: nowrap;
    }
    .story-title:hover {
      background: var(--accent-dim);
    }
    .story-title:focus {
      background: var(--bg-surface);
      border: 1px solid var(--accent);
      box-shadow: 0 0 0 2px var(--accent-dim);
      cursor: text;
    }

    /* Phase badge */
    .phase-badge {
      font-family: var(--font-ui);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 2px 8px;
      border-radius: 10px;
      flex-shrink: 0;
      user-select: none;
    }
    .phase-badge.init {
      background: rgba(201, 164, 76, 0.15);
      color: var(--accent);
      border: 1px solid rgba(201, 164, 76, 0.25);
    }
    .phase-badge.rp {
      background: rgba(124, 184, 122, 0.15);
      color: var(--success);
      border: 1px solid rgba(124, 184, 122, 0.25);
    }

    /* ---- Main Content Area ---- */
    .main-content {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* ---- Chat Column ---- */
    .chat-column {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      position: relative;
    }

    /* ---- Messages Area ---- */
    .messages-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 24px 20px 16px;
      overflow-anchor: auto;
    }
    .messages-list {
      max-width: 780px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ---- Message Bubbles ---- */
    .message {
      position: relative;
      animation: fadeIn 0.4s ease forwards;
      opacity: 0;
    }
    .message:hover .message-actions,
    .message-actions:hover {
      opacity: 1;
      pointer-events: auto;
    }
    .message:hover .message-time {
      opacity: 1;
    }

    /* AI message (left-aligned, story text) */
    .message.assistant {
      padding: 0;
    }
    .message.assistant .message-content {
      font-family: var(--font-body);
      font-size: 15.5px;
      line-height: 1.85;
      color: var(--text-primary);
      letter-spacing: 0.015em;
    }
    .message.assistant .message-content strong {
      color: var(--accent);
      font-weight: 600;
    }
    .message.assistant .message-content em {
      color: var(--text-secondary);
      font-style: italic;
    }
    .message.assistant .message-content .quote-text {
      color: var(--accent);
      font-style: italic;
    }
    .message.assistant .message-content hr.story-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 20px 0;
    }
    /* Thinking block — collapsible */
    .message.assistant .thinking-block {
      margin-bottom: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      font-size: 0.85em;
    }
    .message.assistant .thinking-block summary {
      padding: 6px 12px;
      cursor: pointer;
      color: var(--text-secondary);
      background: var(--bg-secondary);
      user-select: none;
      font-weight: 500;
    }
    .message.assistant .thinking-block summary:hover {
      color: var(--text-primary);
    }
    .message.assistant .thinking-content {
      padding: 10px 12px;
      color: var(--text-secondary);
      line-height: 1.6;
      max-height: 400px;
      overflow-y: auto;
    }
    /* Refine indicator */
    .message.assistant .refine-indicator {
      margin-top: 8px;
      padding: 4px 8px;
      font-size: 0.75em;
      color: var(--text-secondary);
      border-top: 1px solid var(--border);
      opacity: 0.7;
    }

    /* Decorative left accent bar for AI messages */
    .message.assistant::before {
      content: '';
      position: absolute;
      left: -16px;
      top: 4px;
      bottom: 4px;
      width: 2px;
      background: linear-gradient(to bottom, var(--accent), transparent);
      border-radius: 1px;
      opacity: 0.4;
    }

    /* Abstract / details block within AI messages */
    .message.assistant .message-content details {
      margin-top: 16px;
      padding: 10px 14px;
      background: var(--accent-dim);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: var(--font-ui);
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-secondary);
    }
    .message.assistant .message-content details summary {
      cursor: pointer;
      font-weight: 600;
      color: var(--accent);
      font-size: 12px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      user-select: none;
      outline: none;
      margin-bottom: 4px;
    }
    .message.assistant .message-content details summary::-webkit-details-marker {
      color: var(--accent);
    }
    .message.assistant .message-content details[open] summary {
      margin-bottom: 8px;
    }

    /* User message (right-aligned bubble) */
    .message.user {
      display: flex;
      justify-content: flex-end;
    }
    .message.user .message-bubble {
      max-width: 75%;
      background: var(--bg-glass-light);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-lg) var(--radius-lg) 4px var(--radius-lg);
      padding: 12px 18px;
      font-family: var(--font-ui);
      font-size: 14px;
      line-height: 1.65;
      color: var(--text-primary);
      position: relative;
    }

    /* Hidden message (greyed out, strikethrough) */
    .message.hidden-msg {
      opacity: 0.35;
    }
    .message.hidden-msg .message-content,
    .message.hidden-msg .message-bubble {
      text-decoration: line-through;
      text-decoration-color: var(--text-muted);
    }

    /* Message timestamp */
    .message-time {
      font-family: var(--font-ui);
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
      opacity: 0;
      transition: opacity var(--transition);
    }
    .message.user .message-time {
      text-align: right;
    }

    /* Message action buttons (hover toolbar) */
    .message-actions {
      position: absolute;
      top: -8px;
      display: flex;
      gap: 2px;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--transition);
      z-index: 10;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2px;
      box-shadow: var(--shadow);
    }
    .message.assistant .message-actions {
      right: 0;
    }
    .message.user .message-actions {
      left: 0;
    }
    .message-actions .btn-icon {
      width: 28px;
      height: 28px;
    }
    .message-actions .btn-icon .icon {
      width: 14px;
      height: 14px;
    }

    /* ---- Typing / Streaming Indicator ---- */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 0;
      animation: fadeIn 0.3s ease forwards;
      opacity: 0;
    }
    .typing-dots {
      display: flex;
      gap: 4px;
    }
    .typing-dots span {
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 1.2s ease infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
    .typing-label {
      font-family: var(--font-ui);
      font-size: 12px;
      color: var(--text-muted);
      font-style: italic;
    }

    /* Streaming cursor blink */
    .streaming-cursor::after {
      content: '';
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--accent);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: pulse 0.8s ease infinite;
    }

    /* ---- MVU Init Confirmation Bar ---- */
    .mvu-confirm-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: rgba(201, 164, 76, 0.08);
      border: 1px solid rgba(201, 164, 76, 0.2);
      border-radius: var(--radius);
      margin-top: 12px;
      animation: fadeIn 0.4s ease forwards;
      opacity: 0;
      flex-wrap: wrap;
    }
    .mvu-confirm-bar p {
      flex: 1;
      font-size: 13px;
      color: var(--text-secondary);
      min-width: 180px;
    }
    .mvu-confirm-bar .btn {
      font-size: 12px;
      padding: 6px 14px;
    }

    /* ---- Load More ---- */
    .load-more-sentinel {
      text-align: center;
      padding: 12px;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      transition: color 0.15s;
      overflow-anchor: none;
    }
    .load-more-sentinel:hover { color: var(--accent); }

    /* ---- Empty State ---- */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      min-height: 300px;
      color: var(--text-muted);
      text-align: center;
      padding: 40px;
    }
    .empty-state-icon {
      width: 64px;
      height: 64px;
      color: var(--accent);
      opacity: 0.3;
      margin-bottom: 16px;
    }
    .empty-state-icon svg {
      width: 100%;
      height: 100%;
    }
    .empty-state h3 {
      font-family: var(--font-display);
      font-size: 22px;
      color: var(--text-secondary);
      margin-bottom: 8px;
      font-weight: 600;
    }
    .empty-state p {
      font-size: 13px;
      line-height: 1.6;
      max-width: 320px;
    }

    /* ---- Options Tags ---- */
    .options-bar {
      flex-shrink: 0;
      padding: 6px 20px 2px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      max-width: 820px;
      margin: 0 auto;
    }
    .option-tag {
      font-family: var(--font-ui);
      font-size: 12px;
      padding: 5px 12px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 4px;
      max-width: 480px;
    }
    .option-tag:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
      transform: translateY(-1px);
      box-shadow: 0 2px 12px rgba(201, 164, 76, 0.15);
    }
    .option-tag:active {
      transform: translateY(0);
    }
    .option-type {
      font-size: 10px;
      font-weight: 600;
      padding: 1px 5px;
      border-radius: 8px;
      background: var(--accent-dim);
      color: var(--accent);
      flex-shrink: 0;
      letter-spacing: 0.5px;
    }
    .option-text {
      line-height: 1.4;
    }

    /* ---- Input Area ---- */
    .input-area {
      flex-shrink: 0;
      padding: 12px 20px 16px;
      background: linear-gradient(to top, var(--bg-glass) 80%, transparent);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .input-area.disabled {
      pointer-events: none;
      opacity: 0.5;
    }
    .input-wrapper {
      max-width: 780px;
      margin: 0 auto;
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 8px 12px;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .input-wrapper:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-dim);
    }
    .input-textarea {
      flex: 1;
      background: none;
      border: none;
      color: var(--text-primary);
      font-family: var(--font-ui);
      font-size: 14px;
      line-height: 1.55;
      resize: none;
      outline: none;
      min-height: 22px;
      max-height: 160px;
      padding: 4px 0;
      overflow-y: auto;
    }
    .input-textarea::placeholder {
      color: var(--text-muted);
    }
    .input-textarea:focus {
      box-shadow: none;
    }
    .send-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      cursor: pointer;
      transition: all var(--transition);
      flex-shrink: 0;
    }
    .send-btn.ready {
      background: linear-gradient(135deg, var(--accent), #d4b05c);
      color: #1a1510;
    }
    .send-btn.ready:hover {
      filter: brightness(1.15);
      transform: scale(1.05);
    }
    .send-btn.idle {
      background: var(--bg-elevated);
      color: var(--text-muted);
      cursor: default;
    }
    .send-btn.streaming {
      background: var(--danger);
      color: #fff;
    }
    .send-btn.streaming:hover {
      filter: brightness(1.15);
    }
    .send-btn .icon {
      width: 18px;
      height: 18px;
    }

    /* ---- MVU Sidebar ---- */
    .mvu-sidebar {
      width: 360px;
      flex-shrink: 0;
      background: var(--bg-surface);
      border-left: 1px solid var(--border);
      overflow-y: scroll;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
      padding: calc(16px + env(safe-area-inset-top, var(--sat, 0px))) 16px 16px;
      transform: translateX(0);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                  opacity 0.35s ease,
                  width 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                  padding 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 1;
    }
    .mvu-sidebar.collapsed {
      width: 0;
      padding: 0;
      opacity: 0;
      transform: translateX(360px);
      border-left: none;
      overflow: hidden;
    }
    .mvu-sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .mvu-sidebar-title {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.3px;
    }
    .mvu-placeholder {
      text-align: center;
      padding: 32px 12px;
      color: var(--text-muted);
      font-size: 13px;
      font-style: italic;
      line-height: 1.6;
    }
    .mvu-placeholder .icon {
      width: 32px;
      height: 32px;
      color: var(--accent);
      opacity: 0.25;
      margin-bottom: 12px;
    }
    .mvu-content {
      min-height: 40px;
    }
    .mvu-toolbar {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .mvu-toolbar-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .mvu-toolbar-title {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    .mvu-toolbar-title strong {
      color: var(--accent);
      font-size: 14px;
      font-weight: 700;
    }
    .mvu-toolbar-title span {
      color: var(--text-muted);
      font-size: 11px;
    }
    .mvu-toolbar-actions {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .mvu-toolbar-actions .btn-icon svg {
      width: 16px;
      height: 16px;
    }
    .mvu-view-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 4px;
      padding: 3px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: rgba(255,255,255,0.03);
    }
    .mvu-view-btn {
      border: 0;
      border-radius: calc(var(--radius) - 2px);
      background: transparent;
      color: var(--text-secondary);
      font-size: 12px;
      min-height: 30px;
      cursor: pointer;
    }
    .mvu-view-btn.active {
      background: var(--accent);
      color: #1a1510;
      font-weight: 700;
    }
    .mvu-search {
      display: none;
      width: 100%;
      min-height: 34px;
      font-size: 12px;
      padding: 8px 10px;
    }
    .mvu-search.visible {
      display: block;
    }
    .mvu-change-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 22px;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(201,164,76,0.12);
      color: var(--accent);
      font-size: 11px;

    }
    .mvu-detail-row span:first-child {
      color: var(--accent);
      font-weight: 900;
    }
    .mvu-detail-row span:last-child {
      color: var(--text-secondary);
      word-break: break-word;
      white-space: pre-wrap;
    }
    .mvu-detail-actions {
      display: none;
    }
    .mvu-detail-actions .btn {
      min-height: 34px;
      padding: 7px 12px;
      font-size: 12px;
    }

    /* ---- Summary Sidebar ---- */
    .summary-sidebar {
      width: 400px;
      flex-shrink: 0;
      background: var(--bg-surface);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: calc(16px + env(safe-area-inset-top, var(--sat, 0px))) 16px 16px;
      transform: translateX(0);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                  opacity 0.35s ease,
                  width 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                  padding 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 1;
    }
    .summary-sidebar.collapsed {
      width: 0;
      padding: 0;
      opacity: 0;
      transform: translateX(400px);
      border-left: none;
      overflow: hidden;
    }
    .summary-sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .summary-sidebar-title {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.3px;
    }
    .summary-big-block {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 16px;
    }
    .summary-block-title {
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .summary-block-content {
      font-family: var(--font-ui);
      font-size: 13px;
      line-height: 1.7;
      color: var(--text-secondary);
    }
    .summary-abstracts-title {
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }
    .summary-abstract-block {
      display: flex;
      gap: 10px;
      padding: 10px 12px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 8px;
      align-items: flex-start;
    }
    .summary-abstract-code {
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      background: var(--accent-dim);
      padding: 2px 8px;
      border-radius: 8px;
      flex-shrink: 0;
      letter-spacing: 0.5px;
      line-height: 1.6;
    }
    .summary-abstract-content {
      font-family: var(--font-ui);
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-secondary);
    }
    .summary-merged {
      border-color: var(--accent-glow);
      background: rgba(201, 164, 76, 0.06);
    }
    .summary-sm-code {
      background: var(--accent-glow);
      color: var(--bg-deep);
      font-weight: 800;
    }
    .summary-empty {
      text-align: center;
      padding: 32px 12px;
      color: var(--text-muted);
      font-size: 13px;
      font-style: italic;
      line-height: 1.6;
    }

    /* ---- Edit MVU Mode Bar ---- */
    .edit-mode-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: calc(8px + env(safe-area-inset-top, var(--sat, 0px))) 16px 8px;
      background: rgba(201, 164, 76, 0.1);
      border-bottom: 1px solid rgba(201, 164, 76, 0.25);
      flex-shrink: 0;
      z-index: 50;
    }
    .edit-mode-label {
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
    }
    .edit-mode-actions {
      display: flex;
      gap: 8px;
    }
    .edit-mode-actions .btn {
      font-size: 12px;
      padding: 5px 14px;
    }

    /* ---- Prompt Debug Overlay ---- */
    .debug-overlay {
      position: fixed;
      inset: 0;
      z-index: 9500;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s ease;
      pointer-events: none;
    }
    .debug-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }
    .debug-modal {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      width: 92%;
      max-width: 820px;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow);
    }
    .debug-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .debug-title {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 600;
      color: var(--accent);
    }
    .debug-body {
      overflow-y: auto;
      padding: 16px 20px;
      flex: 1;
    }
    .debug-section {
      margin-bottom: 20px;
    }
    .debug-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      border-bottom: 1px solid var(--border);
      margin-bottom: 10px;
    }
    .debug-badge {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      background: var(--bg-elevated);
      padding: 2px 8px;
      border-radius: 10px;
    }
    .debug-message {
      margin-bottom: 6px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .debug-msg-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      background: var(--bg-elevated);
      cursor: pointer;
      user-select: none;
      min-height: 32px;
    }
    .debug-msg-header:hover {
      background: var(--accent-dim);
    }
    .debug-role {
      font-family: var(--font-ui);
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 4px;
      letter-spacing: 0.5px;
      flex-shrink: 0;
    }
    .debug-role-user { background: rgba(100,160,220,0.15); color: #6aa0dc; }
    .debug-role-ai { background: rgba(124,184,122,0.15); color: var(--success); }
    .debug-role-sys { background: rgba(201,164,76,0.15); color: var(--accent); }
    .debug-msg-meta {
      font-family: var(--font-ui);
      font-size: 11px;
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .debug-preview {
      font-family: var(--font-ui);
      font-size: 11px;
      color: var(--text-muted);
      opacity: 0.6;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      min-width: 0;
    }
    .debug-pre {
      font-family: 'SF Mono', 'Fira Code', 'Menlo', monospace;
      font-size: 12px;
      line-height: 1.55;
      color: var(--text-secondary);
      background: var(--bg-deep);
      padding: 10px 12px;
      margin: 0;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .debug-pre.collapsed {
      display: none;
    }

    /* ---- Scroll-to-bottom button ---- */
    .scroll-bottom-btn {
      position: absolute;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg-glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-strong);
      color: var(--text-secondary);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all var(--transition);
      opacity: 0;
      pointer-events: none;
      z-index: 50;
    }
    .scroll-bottom-btn.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0);
    }
    .scroll-bottom-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: var(--accent-dim);
    }
    .scroll-bottom-btn svg {
      width: 18px;
      height: 18px;
    }

    /* ---- Edit Message Overlay ---- */
    .edit-overlay {
      position: fixed;
      inset: 0;
      z-index: 8000;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .edit-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }
    .edit-panel {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      width: 90%;
      max-width: 560px;
      box-shadow: var(--shadow);
    }
    .edit-panel h3 {
      font-family: var(--font-display);
      font-size: 17px;
      color: var(--accent);
      margin-bottom: 12px;
    }
    .edit-panel textarea {
      min-height: 140px;
      margin-bottom: 12px;
    }
    .edit-panel-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    /* ---- Stream Status Indicator ---- */
    .stream-status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 0;
      font-family: var(--font-ui);
      font-size: 13px;
      color: var(--text-muted);
      animation: fadeIn 0.3s ease forwards;
      opacity: 0;
    }
    .stream-status .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .stream-status.connecting .status-dot {
      background: var(--accent);
      animation: pulse 1.2s ease infinite;
    }
    .stream-status.streaming .status-dot {
      background: var(--success);
      animation: pulse 0.8s ease infinite;
    }
    .stream-status.retrying .status-dot {
      background: var(--danger);
      animation: pulse 1s ease infinite;
    }
    .stream-status .status-timer {
      font-variant-numeric: tabular-nums;
      color: var(--text-muted);
      font-size: 11px;
      opacity: 0.7;
    }

    /* ---- Error Retry Bar (inline after failed message) ---- */
    .error-retry-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      margin-top: 8px;
      background: rgba(201, 106, 90, 0.08);
      border: 1px solid rgba(201, 106, 90, 0.2);
      border-radius: var(--radius);
      font-family: var(--font-ui);
      font-size: 13px;
      color: var(--danger);
      animation: fadeIn 0.3s ease forwards;
      opacity: 0;
      flex-wrap: wrap;
    }
    .error-retry-bar .error-msg {
      flex: 1;
      min-width: 120px;
      color: var(--text-secondary);
    }
    .error-retry-bar .error-msg strong {
      color: var(--danger);
      font-weight: 600;
    }
    .error-retry-bar .btn {
      font-size: 12px;
      padding: 5px 12px;
    }

    /* ---- Offline Banner ---- */
    .offline-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 9999;
      background: var(--danger);
      color: #fff;
      text-align: center;
      padding: 6px 16px;
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 500;
      transform: translateY(-100%);
      transition: transform 0.3s ease;
    }
    .offline-banner.visible {
      transform: translateY(0);
    }

    /* ---- Partial response interrupted marker ---- */
    .stream-interrupted {
      display: inline-block;
      padding: 2px 8px;
      margin-left: 4px;
      font-family: var(--font-ui);
      font-size: 11px;
      color: var(--danger);
      opacity: 0.7;
      border-left: 2px solid var(--danger);
    }

    /* ---- Copy success feedback ---- */
    @keyframes copyFlash {
      0% { background: var(--accent-dim); }
      100% { background: transparent; }
    }
    .copy-flash {
      animation: copyFlash 0.6s ease;
    }

    /* ---- Mobile Overlay for sidebar ---- */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 199;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    .sidebar-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    /* ---- Mobile sidebar close button (hidden on desktop) ---- */
    .sidebar-close-btn {
      display: none;
    }

    /* ---- Mobile Options FAB ---- */
    .options-fab {
      display: none;
      position: fixed;
      z-index: 150;
      bottom: 80px;
      right: 16px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      color: var(--accent);
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
      touch-action: none;
      user-select: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .options-fab svg {
      width: 20px;
      height: 20px;
      pointer-events: none;
    }
    .options-fab.has-options {
      border-color: var(--accent);
      box-shadow: 0 2px 16px rgba(201, 164, 76, 0.3);
    }
    .options-fab.pulse {
      animation: optionsPulse 0.6s ease 3;
    }
    @keyframes optionsPulse {
      0%, 100% { box-shadow: 0 2px 12px rgba(201, 164, 76, 0.3); }
      50% { box-shadow: 0 0 20px rgba(201, 164, 76, 0.6), 0 0 40px rgba(201, 164, 76, 0.2); }
    }
    .options-fab-panel {
      display: none;
      position: fixed;
      z-index: 149;
      bottom: 70px;
      left: 12px;
      right: 12px;
      flex-direction: column;
      gap: 8px;
      padding: 14px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: 0 -4px 24px rgba(0,0,0,0.4);
      max-height: 50vh;
      overflow-y: auto;
    }
    .options-fab-panel.open {
      display: flex;
    }
    .options-fab-panel .option-tag {
      max-width: none;
      white-space: normal;
      justify-content: flex-start;
      text-align: left;
    }

    /* ---- Responsive ---- */
    @media (max-width: 768px) {
      .sidebar-close-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        position: absolute;
        top: 10px;
        right: 10px;
        width: 32px;
        height: 32px;
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        border-radius: 50%;
        color: var(--text-secondary);
        cursor: pointer;
        z-index: 10;
      }
      .sidebar-close-btn svg {
        width: 16px;
        height: 16px;
      }
      .sidebar-close-btn:hover {
        color: var(--accent);
        border-color: var(--accent);
      }
      .sidebar-overlay {
        display: block;
      }
      .mvu-sidebar {
        position: fixed;
        right: 0;
        top: 0;
        bottom: 0;
        z-index: 200;
        width: 360px;
        box-shadow: -4px 0 24px rgba(0,0,0,0.5);
      }
      .mvu-sidebar.collapsed {
        transform: translateX(100%);
      }
      .summary-sidebar {
        position: fixed;
        right: 0;
        top: 0;
        bottom: 0;
        z-index: 200;
        width: 360px;
        box-shadow: -4px 0 24px rgba(0,0,0,0.5);
      }
      .summary-sidebar.collapsed {
        transform: translateX(100%);
      }
      .message.user .message-bubble {
        max-width: 90%;
      }
      /* Mobile: tap to show action buttons */
      .message-actions {
        position: relative;
        top: 0;
        margin-top: 4px;
      }
      .message.show-actions .message-actions {
        opacity: 1;
        pointer-events: auto;
      }
      .message.assistant .message-actions {
        justify-content: flex-start;
      }
      .message.user .message-actions {
        justify-content: flex-end;
      }
      .story-title {
        max-width: 160px;
        font-size: 17px;
      }
      .messages-area {
        padding: 16px 14px 12px;
      }
      .input-area {
        padding: 10px 14px 14px;
      }
      .mvu-confirm-bar, .error-retry-bar {
        flex-direction: column;
        align-items: stretch;
        gap: 8px;
      }
      .mvu-confirm-bar .btn, .error-retry-bar .btn {
        text-align: center;
        justify-content: center;
        min-height: 44px;
      }
      .mvu-detail-overlay {
        align-items: center;
        padding: 18px;
      }
      .mvu-detail-card {
        width: min(430px, 94vw);
        max-height: 78vh;
        border-radius: 18px;
      }
      .options-bar {
        padding: 4px 14px 2px;
        gap: 6px;
      }
      /* Mobile: hide default options bar, use floating icon instead */
      .options-bar {
        display: none !important;
      }
      .options-fab.has-options {
        display: flex;
      }
      /* Mobile: disable all backdrop-filter to prevent GPU blur artifacts */
      .topbar,
      .message.user .message-bubble,
      .input-area,
      .scroll-bottom-btn,
      .edit-overlay,
      .sidebar-overlay,
      .mvu-sidebar,
      .summary-sidebar {
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
      }
      .topbar,
      .input-area {
        background: var(--bg-surface);
      }
    }
  </style>
</head>
<body>

<div class="chat-app" id="app">

  <!-- Top Bar -->
  <div class="topbar">
    <div class="topbar-left">
      <button class="btn-icon" id="backBtn" title="返回" onclick="goBack()">
        <span class="icon" style="width:20px;height:20px;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </span>
      </button>
    </div>
    <div class="topbar-center">
      <input type="text" class="story-title" id="storyTitle" value="新故事"
             onfocus="this.select()" onblur="saveTitle()" onkeydown="if(event.key==='Enter'){this.blur();}">
      <span class="phase-badge init" id="phaseBadge">初始化</span>
    </div>
    <div class="topbar-right">
      <button class="btn-icon" id="summaryToggle" title="故事摘要" onclick="toggleSummaryPanel()">
        <span class="icon" style="width:20px;height:20px;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        </span>
      </button>
      <div class="topbar-dropdown">
        <button class="btn-icon" id="moreMenuBtn" title="更多" onclick="toggleMoreMenu(event)">
          <span class="icon" style="width:20px;height:20px;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
          </span>
        </button>
        <div class="topbar-menu" id="moreMenu"></div>
      </div>
      <button class="btn-icon" id="sidebarToggle" title="状态栏" onclick="toggleSidebar()">
        <span class="icon" style="width:20px;height:20px;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
        </span>
      </button>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main-content">

    <!-- Chat Column -->
    <div class="chat-column">

      <!-- Edit Mode Bar (hidden by default) -->
      <div class="edit-mode-bar" id="editModeBar" style="display:none;">
        <span class="edit-mode-label">状态栏编辑模式</span>
        <div class="edit-mode-actions">
          <button class="btn btn-secondary" onclick="exitEditMvuMode(false)">放弃</button>
          <button class="btn btn-primary" onclick="exitEditMvuMode(true)">应用</button>
        </div>
      </div>

      <!-- Messages Area -->
      <div class="messages-area" id="messagesArea">
        <div class="messages-list" id="messagesList"></div>
      </div>

      <!-- Scroll to bottom -->
      <button class="scroll-bottom-btn" id="scrollBottomBtn" onclick="scrollToBottom(true)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>

      <!-- Options Bar (desktop) -->
      <div class="options-bar" id="optionsBar" style="display:none;"></div>

      <!-- Options FAB (mobile) -->
      <div class="options-fab" id="optionsFab" onclick="toggleOptionsFabPanel()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </div>
      <div class="options-fab-panel" id="optionsFabPanel"></div>

      <!-- Input Area -->
      <div class="input-area" id="inputArea">
        <div class="input-wrapper">
          <textarea class="input-textarea" id="inputTextarea"
                    placeholder="写下你的行动..."
                    rows="1"

<script>
// ============================================================
// State
// ============================================================
let conversation = null;
let isStreaming = false;
let streamAborted = false;
let streamStopRequested = false;
let editingMsgId = null;
let sidebarOpen = false;
let summaryPanelOpen = false;
let editMvuMode = false;
let editMvuMessages = [];
let editMvuBackup = null;
let mvuViewMode = 'visual';
let mvuGameTab = 'character';
let mvuGameSelection = {
  character: null,
  inventory: null,
  skills: null,
  quests: null,
  world: null,
};
let mvuGameDetailOpen = false;
let mvuSearchQuery = '';
let userScrolledUp = false;
let _lastBuiltPrompt = null; // cached prompt for debug inspector
let pendingMvuInit = null;
let currentAbortController = null;
let streamStartTime = 0;
let streamStatusTimer = null;
let lastFailedUserMsgId = null;

// ============================================================
// Initialization
// ============================================================
document.addEventListener('DOMContentLoaded', init);

async function init() {
  await Config.load();
  if (Config.isPublic()) {
    const token = Storage.getAuthToken();
    if (!token) { location.href = 'login.html'; return; }
    try {
      const res = await fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + token } });
      const me = await res.json();
      if (!me.ok) { Storage.clearAuthToken(); location.href = 'login.html'; return; }
    } catch { Storage.clearAuthToken(); location.href = 'login.html'; return; }
  }
  // Sync from server before loading conversation
  await Storage.syncFromServer();

  const params = new URLSearchParams(location.search);
  const convId = params.get('id');

  if (!convId) {
    goBack();
    return;
  }

  conversation = await Storage.loadConversation(convId);
  if (!conversation) {
    UI.showToast('会话不存在', 'error');
    setTimeout(() => goBack(), 1200);
    return;
  }

  // Clean up stale per-conversation API fields (now global-only)
  if (conversation.apiProfileId || conversation.model) {
    delete conversation.apiProfileId;
    delete conversation.model;
    Storage.saveConversation(conversation);
    log('Cleaned stale apiProfileId/model from conversation');
  }

  // Clean up any empty assistant messages (from failed API calls)
  const beforeClean = conversation.messages.length;
  conversation.messages = conversation.messages.filter(m => m.role !== 'assistant' || (m.content && m.content.trim()));
  if (conversation.messages.length < beforeClean) {
    log('Cleaned', beforeClean - conversation.messages.length, 'empty assistant messages');
    Storage.saveConversation(conversation);
  }

  // Ensure summary object exists
  if (!conversation.summary) {
    const settings = Storage.getSettings();
    conversation.summary = { mergedSummaries: [], lastMergedIdx: 0, interval: settings.summaryInterval || 100 };
    Storage.saveConversation(conversation);
  }
  // Migrate old summary format (text → mergedSummaries)
  if (conversation.summary.text && !conversation.summary.mergedSummaries) {
    conversation.summary.mergedSummaries = [{ code: 'sm01', content: conversation.summary.text }];
    delete conversation.summary.text;
    Storage.saveConversation(conversation);
  }
  if (!conversation.summary.mergedSummaries) {
    conversation.summary.mergedSummaries = [];
  }
  const mvuNormalized = normalizeMvuStructure(['characters', 'main_quests', 'side_quests']);
  if (mvuNormalized.changed) {
    Storage.saveConversation(conversation);
  }

  // Mobile: move sidebar out of overflow:hidden parent to fix touch scrolling
  if (window.innerWidth <= 768) {
    document.body.appendChild(document.getElementById('mvuSidebar'));
    document.body.appendChild(document.getElementById('summarySidebar'));
  }

  // Render initial state
  renderTitle();
  renderPhaseBadge();
  renderAllMessages();
  renderMvuSidebar();
  setupAutoGrow();
  setupScrollDetection();
  setupIOSKeyboardFix();
  updateSendButton();

  // Restore options from last AI message
  const lastAiMsg = [...conversation.messages].reverse().find(m => m.role === 'assistant');
  if (lastAiMsg) renderOptionsBar(lastAiMsg.content);

  // Restore pendingMvuInit from last AI messages if init phase and not yet confirmed
  if (conversation.phase === 'init' && !conversation.mvu) {
    for (let i = conversation.messages.length - 1; i >= 0; i--) {
      const msg = conversation.messages[i];
      if (msg.role !== 'assistant' || !msg.content) continue;
      const initData = MVU.parseInit(msg.content);
      if (initData) {
        const storySetting = MVU.parseStorySetting(msg.content);
        initData._storySetting = storySetting || '';
        // If this message has no story_setting, scan earlier messages for it
        if (!initData._storySetting) {
          for (let k = i - 1; k >= 0; k--) {
            const earlier = conversation.messages[k];
            if (earlier.role !== 'assistant' || !earlier.content) continue;
            const ss = MVU.parseStorySetting(earlier.content);
            if (ss) { initData._storySetting = ss; break; }
          }
        }
        // Also check subsequent messages for incremental updates
        for (let j = i + 1; j < conversation.messages.length; j++) {
          const later = conversation.messages[j];
          if (later.role !== 'assistant' || !later.content) continue;
          const update = MVU.parseMvuUpdate(later.content);
          if (update) {
            if (update.schema) initData.schema = update.schema;
            if (update.html) initData.html = update.html;
            if (update.css) initData.css = update.css;
          }
          const ss = MVU.parseStorySetting(later.content);
          if (ss) initData._storySetting = ss;
          const patch = MVU.parseStorySettingPatch(later.content);
          if (patch) initData._storySetting = MVU.applyStorySettingPatch(initData._storySetting, patch);
        }
        pendingMvuInit = initData;
        previewMvuInit();
        showMvuInitConfirmation();
        break;
      }
    }
  }

  // In RP phase, open sidebar by default on desktop
  if (conversation.phase === 'rp' && conversation.mvu?.html && window.innerWidth > 768) {
    toggleSidebar();
  }

  // Offline detection
  setupOfflineDetection();

  // Focus input
  document.getElementById('inputTextarea').focus();
  log('Chat initialized', { id: conversation.id, phase: conversation.phase, msgCount: conversation.messages.length });
}

// ============================================================
// Navigation
// ============================================================
function goBack() {
  location.href = 'index.html?v=12';
}

// ============================================================
// Title
// ============================================================
function renderTitle() {
  const el = document.getElementById('storyTitle');
  el.value = conversation.name || '新故事';
  document.title = `入卷 - ${conversation.name || '新故事'}`;
}

function saveTitle() {
  const el = document.getElementById('storyTitle');
  const newName = el.value.trim() || '新故事';
  el.value = newName;
  if (conversation.name !== newName) {
    conversation.name = newName;
    Storage.saveConversation(conversation);
    document.title = `入卷 - ${newName}`;
  }
}

// ============================================================
// Phase Badge
// ============================================================
function renderPhaseBadge() {
  const badge = document.getElementById('phaseBadge');
  if (conversation.phase === 'rp') {
    badge.textContent = 'RP';
    badge.className = 'phase-badge rp';
  } else {
    badge.textContent = '初始化';
    badge.className = 'phase-badge init';
  }
}

// ============================================================
// More Menu (API switch + Preset switch)
// ============================================================
let _moreMenuOpen = false;

function toggleMoreMenu(e) {
  e.stopPropagation();
  const menu = document.getElementById('moreMenu');
  _moreMenuOpen = !_moreMenuOpen;
  if (_moreMenuOpen) {
    renderMoreMenu();
    // Position below the button
    const btn = document.getElementById('moreMenuBtn');
    const rect = btn.getBoundingClientRect();
    menu.style.top = (rect.bottom + 6) + 'px';
    menu.classList.add('show');
  } else {
    menu.classList.remove('show');
  }
}

function closeMoreMenu() {
  _moreMenuOpen = false;
  document.getElementById('moreMenu')?.classList.remove('show');
}

function renderMoreMenu() {
  const menu = document.getElementById('moreMenu');
  const settings = Storage.getSettings();
  const profiles = Storage.getApiProfiles();
  const profileList = Object.values(profiles);
  const currentApiId = settings.defaultApiProfileId;
  const presets = settings.promptPresets || {};
  const currentPresetId = settings.activePresetId || 'default';
  const isRp = conversation?.phase === 'rp';

  const icon = (svg) => `<svg class="menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${svg}</svg>`;

  let html = '';

  // --- Tools section ---
  html += `<div class="topbar-menu-item" onclick="closeMoreMenu();openWorldSetting()">
    ${icon('<circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>')}
    世界设定</div>`;
  html += `<div class="topbar-menu-item" onclick="closeMoreMenu();enterEditMvuMode()">
    ${icon('<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>')}
    编辑状态栏</div>`;
  if (isRp) {
    html += `<div class="topbar-menu-item" onclick="closeMoreMenu();restartGame()">
      ${icon('<polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>')}
      重新开始</div>`;
  }
  html += `<div class="topbar-menu-item" onclick="closeMoreMenu();showPromptDebug()">
    ${icon('<polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/>')}
    Prompt Inspector</div>`;

  html += '<div class="topbar-menu-divider"></div>';

  // --- API profiles ---
  html += '<div class="topbar-menu-label">API</div>';
  for (const p of profileList) {
    const active = p.id === currentApiId ? ' active' : '';
    html += `<div class="topbar-menu-item${active}" onclick="switchApi('${Utils.escapeHtml(p.id)}')">
      ${active ? icon('<polyline points="20 6 9 17 4 12"/>') : '<span class="menu-icon"></span>'}
      ${Utils.escapeHtml(p.name || p.id)}</div>`;
  }
  if (profileList.length === 0) {
    html += '<div class="topbar-menu-item" style="color:var(--text-muted);"><span class="menu-icon"></span>未配置</div>';
  }

  html += '<div class="topbar-menu-divider"></div>';

  // --- Presets ---
  html += '<div class="topbar-menu-label">Preset</div>';
  for (const [id, preset] of Object.entries(presets)) {
    const active = id === currentPresetId ? ' active' : '';
    html += `<div class="topbar-menu-item${active}" onclick="switchPreset('${Utils.escapeHtml(id)}')">
      ${active ? icon('<polyline points="20 6 9 17 4 12"/>') : '<span class="menu-icon"></span>'}
      ${Utils.escapeHtml(preset.name || id)}</div>`;
  }

  menu.innerHTML = html;
}

function switchApi(profileId) {
  const settings = Storage.getSettings();
  const profile = Storage.getApiProfile(profileId);
  if (!profile) return;

  const newModel = profile.defaultModel || profile.model || '';

  // Save current model to old profile
  const oldId = settings.defaultApiProfileId;
  if (oldId && oldId !== profileId) {
    const oldProfile = Storage.getApiProfile(oldId);
    if (oldProfile && settings.defaultModel) {
      oldProfile.defaultModel = settings.defaultModel;
      Storage.saveApiProfile(oldProfile);
    }
  }

  // Update global settings only
  settings.defaultApiProfileId = profileId;
  settings.defaultModel = newModel;
  Storage.saveSettings(settings);
  closeMoreMenu();
  UI.showToast(`已切换: ${profile.name || profileId}`, 'success');
}

function switchPreset(presetId) {
  const settings = Storage.getSettings();
  if (!settings.promptPresets?.[presetId]) return;
  settings.activePresetId = presetId;
  Storage.saveSettings(settings);
  closeMoreMenu();
  UI.showToast(`预设: ${settings.promptPresets[presetId].name || presetId}`, 'success');
}

// Close menu on outside click
document.addEventListener('click', () => { if (_moreMenuOpen) closeMoreMenu(); });

// ============================================================
// World Setting Modal
// ============================================================

function openWorldSetting() {
  const textarea = document.getElementById('worldSettingText');
  textarea.value = conversation?.storySetting || '';
  document.getElementById('worldSettingOverlay').classList.add('visible');
  textarea.focus();
}

function closeWorldSetting() {
  document.getElementById('worldSettingOverlay').classList.remove('visible');
}

function saveWorldSetting() {
  const text = document.getElementById('worldSettingText').value.trim();
  if (!conversation) return;
  conversation.storySetting = text;
  Storage.saveConversation(conversation);
  closeWorldSetting();
  UI.showToast('世界设定已保存', 'success');
}

// ============================================================
// Message Rendering
// ============================================================

/**
 * Render AI message content with proper handling of <details> blocks.
 * Strategy:
 *   1. Clean MVU/story_setting code blocks from text
 *   2. Separate the abstract (<details>) from the story body
 *   3. Render story body through renderMarkdown (which escapes HTML)
 *   4. Append abstract as raw trusted HTML
 */
function renderAiContent(rawContent) {
  if (!rawContent) return '';
  // Extract <thinking> block as collapsible
  const thinking = MVU.parseThinking(rawContent);
  let thinkingHtml = '';
  if (thinking) {
    const thinkEscaped = Utils.escapeHtml(thinking).replace(/\n/g, '<br>');
    thinkingHtml = `<details class="thinking-block"><summary>思考过程</summary><div class="thinking-content">${thinkEscaped}</div></details>`;
  }
  // Extract story content with refine applied
  const storyText = Utils.extractStoryContent(rawContent, true);
  // Check if refine was applied (for indicator)
  const refineArr = MVU.parseRefine(rawContent);
  let refineHtml = '';
  if (refineArr && refineArr.length > 0) {
    refineHtml = `<div class="refine-indicator" title="AI 自动润色了 ${refineArr.length} 处表述">* 已润色 ${refineArr.length} 处</div>`;
  }
  return thinkingHtml + Utils.renderMarkdown(storyText) + refineHtml;
}

const MSG_PAGE_SIZE = 20;
let _renderedFromIdx = 0; // tracks how far back we've rendered

function renderAllMessages() {
  const list = document.getElementById('messagesList');
  list.innerHTML = '';

  if (conversation.messages.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">${Icons.book}</div>
        <h3>Begin Your Story</h3>
        <p>${conversation.phase === 'init'
          ? '请输入「详细定制」，AI 会陪你逐步打磨世界观、角色设定等。你也可以输入「快速开始」，AI 会协助你快速构建想要的世界。如果没想好玩什么，输入「直接开始」即可完全随机生成。'
          : '输入「开始」，AI 将根据设定为你展开第一幕故事。'}</p>
      </div>`;
    _renderedFromIdx = 0;
    return;
  }

  const total = conversation.messages.length;
  _renderedFromIdx = Math.max(0, total - MSG_PAGE_SIZE);

  // Insert load-more sentinel if there are older messages
  if (_renderedFromIdx > 0) {
    const sentinel = document.createElement('div');
    sentinel.id = 'loadMoreSentinel';
    sentinel.className = 'load-more-sentinel';
    sentinel.textContent = `↑ 加载更早的消息 (${_renderedFromIdx} 条)`;
    sentinel.onclick = () => loadOlderMessages();
    list.appendChild(sentinel);
  }

  for (let i = _renderedFromIdx; i < total; i++) {
    const msg = conversation.messages[i];
    const el = createMessageElement(msg, i);
    list.appendChild(el);
  }

  scrollToBottom(false);
  _setupScrollLoadMore();
}

let _loadingOlder = false;
function loadOlderMessages() {
  if (_renderedFromIdx <= 0 || _loadingOlder) return;
  _loadingOlder = true;

  const list = document.getElementById('messagesList');
  const area = document.getElementById('messagesArea');
  const prevScrollHeight = area.scrollHeight;

  const loadTo = Math.max(0, _renderedFromIdx - MSG_PAGE_SIZE);
  const fragment = document.createDocumentFragment();

  for (let i = loadTo; i < _renderedFromIdx; i++) {
    const msg = conversation.messages[i];
    const el = createMessageElement(msg, i);
    fragment.appendChild(el);
  }

  const sentinel = document.getElementById('loadMoreSentinel');
  if (sentinel) {
    sentinel.after(fragment);
    if (loadTo <= 0) {
      sentinel.remove();
    } else {
      sentinel.textContent = `↑ 加载更早的消息 (${loadTo} 条)`;
    }
  } else {
    list.prepend(fragment);
  }

  _renderedFromIdx = loadTo;

  // overflow-anchor handles scroll position automatically
  setTimeout(() => { _loadingOlder = false; }, 100);
}

function _setupScrollLoadMore() {
  const area = document.getElementById('messagesArea');
  if (area._scrollLoadHandler) return; // already set up
  // Delay binding to avoid triggering during initial scroll-to-bottom
  setTimeout(() => {
    area._scrollLoadHandler = () => {
      if (area.scrollTop < 100 && _renderedFromIdx > 0) {
        loadOlderMessages();
      }
    };
    area.addEventListener('scroll', area._scrollLoadHandler, { passive: true });
  }, 500);
}

function createMessageElement(msg, idx) {
  const wrapper = document.createElement('div');
  wrapper.className = `message ${msg.role}${msg.hidden ? ' hidden-msg' : ''}`;
  wrapper.id = `msg-${msg.id || idx}`;
  wrapper.dataset.msgIdx = idx;

  // Build action buttons
  const msgIdAttr = msg.id || idx;
  const actionsHtml = `
    <div class="message-actions">
      <button class="btn-icon" title="复制" onclick="copyMessage('${msgIdAttr}')">
        <span class="icon" style="width:14px;height:14px;">${Icons.copy}</span>
      </button>
      <button class="btn-icon" title="编辑" onclick="editMessage('${msgIdAttr}')">
        <span class="icon" style="width:14px;height:14px;">${Icons.edit}</span>
      </button>
      ${msg.role === 'user' ? `<button class="btn-icon" title="重新发送" onclick="retryMessage('${msgIdAttr}')">
        <span class="icon" style="width:14px;height:14px;">${Icons.retry}</span>
      </button>` : ''}
      ${conversation.phase === 'rp' ? `<button class="btn-icon" title="回档到此" onclick="revertToMessage('${msgIdAttr}')">
        <span class="icon" style="width:14px;height:14px;">${Icons.rewind}</span>
      </button>` : ''}
      <button class="btn-icon" title="删除" onclick="deleteMessage('${msgIdAttr}')">
        <span class="icon" style="width:14px;height:14px;">${Icons.trash}</span>
      </button>
    </div>`;

  const timeStr = msg.timestamp ? Utils.formatTime(msg.timestamp) : '';
  const timeHtml = timeStr ? `<div class="message-time">${timeStr}</div>` : '';

  if (msg.role === 'assistant') {
    const rendered = renderAiContent(msg.content);
    wrapper.innerHTML = `
      ${actionsHtml}
      <div class="message-content">${rendered}</div>
      ${timeHtml}`;
  } else {
    const escaped = Utils.escapeHtml(msg.content);
    wrapper.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:flex-end;width:100%;">
        ${actionsHtml}
        <div class="message-bubble">${escaped.replace(/\n/g, '<br>')}</div>
        ${timeHtml}
      </div>`;
  }

  return wrapper;
}

function appendMessageElement(msg) {
  const list = document.getElementById('messagesList');
  // Remove empty state if present
  const empty = list.querySelector('.empty-state');
  if (empty) empty.remove();

  const idx = conversation.messages.indexOf(msg);
  const el = createMessageElement(msg, idx >= 0 ? idx : conversation.messages.length - 1);
  list.appendChild(el);
  scrollToBottom(false);
  return el;
}

function updateAssistantBubble(msgId, content, streaming) {
  const wrapper = document.getElementById(`msg-${msgId}`);
  if (!wrapper) return;
  const contentEl = wrapper.querySelector('.message-content');
  if (!contentEl) return;

  if (editMvuMode) {
    // Edit mode: show full response (code blocks cleaned for display)
    const cleaned = MVU.cleanText(content);
    contentEl.innerHTML = Utils.renderMarkdown(cleaned);
    if (streaming && cleaned) contentEl.classList.add('streaming-cursor');
    else contentEl.classList.remove('streaming-cursor');
  } else if (streaming) {
    // During streaming: show <thinking> as collapsible + <story> content
    // Detect thinking block (complete or partial) — supports <thinking>, <think>, <deep_thinking>
    let thinkOpen = content.indexOf('<thinking>');
    let thinkClose = content.indexOf('</thinking>');
    let tagLen = 10; // '<thinking>'.length
    if (thinkOpen === -1) {
      thinkOpen = content.indexOf('<think>');
      thinkClose = content.indexOf('</think>');
      tagLen = 7; // '<think>'.length
    }
    if (thinkOpen === -1) {
      thinkOpen = content.indexOf('<deep_thinking>');
      thinkClose = content.indexOf('</deep_thinking>');
      tagLen = 15; // '<deep_thinking>'.length
    }

    // Get or create the thinking block element (avoid full rebuild each chunk)
    let thinkEl = contentEl.querySelector('.thinking-block');
    let storyEl = contentEl.querySelector('.streaming-story');

    if (thinkClose !== -1) {
      // Complete thinking — render collapsed, only rebuild if not already finalized
      if (!thinkEl || !thinkEl.dataset.finalized) {
        const thinkText = content.substring(thinkOpen + tagLen, thinkClose).trim();
        const thinkEscaped = Utils.escapeHtml(thinkText).replace(/\n/g, '<br>');
        if (!thinkEl) {
          thinkEl = document.createElement('details');
          thinkEl.className = 'thinking-block';
          contentEl.prepend(thinkEl);
        }
        thinkEl.removeAttribute('open');
        thinkEl.dataset.finalized = '1';
        thinkEl.innerHTML = `<summary>思考过程</summary><div class="thinking-content">${thinkEscaped}</div>`;
      }
      // Update story part only
      const storyText = Utils.extractStoryContent(content);
      if (!storyEl) {
        storyEl = document.createElement('div');
        storyEl.className = 'streaming-story';
        contentEl.appendChild(storyEl);
      }
      storyEl.innerHTML = Utils.renderMarkdown(storyText);
      if (storyText) contentEl.classList.add('streaming-cursor');
    } else if (thinkOpen !== -1) {
      // Partial thinking — still streaming thought, update content in place
      const thinkText = content.substring(thinkOpen + tagLen).trim();
      const thinkEscaped = Utils.escapeHtml(thinkText).replace(/\n/g, '<br>');
      if (!thinkEl) {
        contentEl.innerHTML = '';
        thinkEl = document.createElement('details');
        thinkEl.className = 'thinking-block';
        thinkEl.setAttribute('open', '');
        contentEl.appendChild(thinkEl);
      }
      thinkEl.innerHTML = `<summary>思考中…</summary><div class="thinking-content">${thinkEscaped}</div>`;
      contentEl.classList.add('streaming-cursor');
    } else {
      // No thinking block — just story content
      const storyText = Utils.extractStoryContent(content);
      contentEl.innerHTML = Utils.renderMarkdown(storyText);
      if (storyText) contentEl.classList.add('streaming-cursor');
    }
  } else {
    // Final render
    contentEl.innerHTML = renderAiContent(content);
    contentEl.classList.remove('streaming-cursor');
  }
}

function appendOptionToTextarea(textarea, text) {
  const current = textarea.value;
  textarea.value = current ? `${current}${/\s$/.test(current) ? '' : '\n'}${text}` : text;
  resetTextareaHeight();
  updateSendButton();
  textarea.focus();
  textarea.setSelectionRange(textarea.value.length, textarea.value.length);
}

function renderOptionsBar(rawContent) {
  const bar = document.getElementById('optionsBar');
  if (!bar) return;

  const options = MVU.parseOptions(rawContent);
  if (!options || options.length === 0 || conversation.phase === 'init') {
    bar.style.display = 'none';
    bar.innerHTML = '';
    _optionActions = [];
    return;
  }

  _optionActions = [];
  const optionsHtml = options.map((opt, i) => {
    const match = opt.match(/^\d+\.\s*\(([^)]+)\)\s*[：:]\s*(.+)$/);
    if (match) {
      _optionActions.push(match[2]);
      return `<button class="option-tag" onclick="selectOption(${i})">
        <span class="option-type">${Utils.escapeHtml(match[1])}</span>
        <span class="option-text">${Utils.escapeHtml(match[2])}</span>
      </button>`;
    }
    const plain = opt.replace(/^\d+\.\s*/, '');
    _optionActions.push(plain);
    return `<button class="option-tag" onclick="selectOption(${i})">
      <span class="option-text">${Utils.escapeHtml(plain)}</span>
    </button>`;
  }).join('');

  // Desktop: show in options bar
  bar.innerHTML = optionsHtml;
  bar.style.display = 'flex';

  // Mobile FAB: populate panel and show icon
  const fab = document.getElementById('optionsFab');
  const panel = document.getElementById('optionsFabPanel');
  if (fab && panel) {
    panel.innerHTML = optionsHtml;
    fab.classList.add('has-options');
    fab.classList.remove('pulse');
    void fab.offsetWidth; // force reflow
    fab.classList.add('pulse');
  }
}

function selectOption(idx) {
  const text = _optionActions[idx];
  if (!text) return;
  // Close mobile panel if open
  const panel = document.getElementById('optionsFabPanel');
  if (panel) panel.classList.remove('open');
  const textarea = document.getElementById('inputTextarea');
  if (!textarea) return;

  if (getOptionsFabSendMode() === 'append') {
    appendOptionToTextarea(textarea, text);
    UI.showToast('选项已追加到输入框', 'info');
    return;
  }

  textarea.value = text;
  handleSend();
}

function clearOptionsBar() {
  const bar = document.getElementById('optionsBar');
  if (bar) { bar.style.display = 'none'; bar.innerHTML = ''; }
  // Clear mobile FAB
  const fab = document.getElementById('optionsFab');
  const panel = document.getElementById('optionsFabPanel');
  if (fab) { fab.classList.remove('has-options', 'pulse'); }
  if (panel) { panel.classList.remove('open'); panel.innerHTML = ''; }
}

// Mobile options FAB toggle & drag
function toggleOptionsFabPanel() {
  if (_optionsFabSuppressClick) {
    _optionsFabSuppressClick = false;
    return;
  }
  if (_optionsFabMoved) return;
  const panel = document.getElementById('optionsFabPanel');
  if (panel) panel.classList.toggle('open');
}

(function setupOptionsFabDrag() {
  document.addEventListener('DOMContentLoaded', () => {
    const fab = document.getElementById('optionsFab');
    if (!fab) return;
    let dragging = false, startX, startY, fabX, fabY;

    const clearLongPress = () => {
      if (_optionsFabLongPressTimer) {
        clearTimeout(_optionsFabLongPressTimer);
        _optionsFabLongPressTimer = null;
      }
    };

    const startLongPress = () => {
      clearLongPress();
      _optionsFabLongPressTimer = setTimeout(() => {
        dragging = false;
        _optionsFabSuppressClick = true;
        openOptionsFabSettings();
      }, OPTIONS_FAB_LONG_PRESS_MS);
    };

    fab.addEventListener('touchstart', (e) => {
      dragging = true;
      _optionsFabMoved = false;
      const t = e.touches[0];
      const rect = fab.getBoundingClientRect();
      startX = t.clientX;
      startY = t.clientY;
      fabX = rect.left;
      fabY = rect.top;
      fab.style.transition = 'none';
      startLongPress();
    }, { passive: true });

    document.addEventListener('touchmove', (e) => {
      if (!dragging) return;
      const t = e.touches[0];
      const dx = t.clientX - startX;
      const dy = t.clientY - startY;
      if (Math.abs(dx) > 8 || Math.abs(dy) > 8) _optionsFabMoved = true;
      if (_optionsFabMoved) clearLongPress();
      if (!_optionsFabMoved) return;
      const newX = Math.max(0, Math.min(window.innerWidth - 44, fabX + dx));
      const newY = Math.max(0, Math.min(window.innerHeight - 44, fabY + dy));
      fab.style.left = newX + 'px';
      fab.style.top = newY + 'px';
      fab.style.right = 'auto';
      fab.style.bottom = 'auto';
    }, { passive: true });

    document.addEventListener('touchend', () => {
      clearLongPress();
      if (!dragging) return;
      dragging = false;
      fab.style.transition = '';
      if (_optionsFabMoved) {
        const rect = fab.getBoundingClientRect();
        const midX = rect.left + 22;
        if (midX < window.innerWidth / 2) {
          fab.style.left = '16px';
          fab.style.right = 'auto';
        } else {
          fab.style.left = 'auto';
          fab.style.right = '16px';
        }
      }
    });

    fab.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      _optionsFabMoved = false;
      startLongPress();
    });

    fab.addEventListener('mouseup', clearLongPress);
    fab.addEventListener('mouseleave', clearLongPress);
    fab.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      clearLongPress();
      _optionsFabSuppressClick = true;
      openOptionsFabSettings();
    });
  });
})();

function getAbstracts() {
  const abstracts = [];
  let counter = 1;
  for (const msg of (conversation?.messages || [])) {
    if (msg.role === 'assistant' && msg.abstract) {
      const code = 'ab' + String(counter).padStart(2, '0');
      const content = Summary.extractAbstractContent(msg.abstract) || msg.abstract;
      abstracts.push({ code, content, timestamp: msg.timestamp });
      counter++;
    }
  }
  return abstracts;
}

function renderSummaryPanel() {
  const container = document.getElementById('summaryContent');
  let html = '';

  // Merged summaries (sm entries)
  const mergedSm = conversation.summary?.mergedSummaries || [];
  if (mergedSm.length > 0) {
    html += '<div class="summary-abstracts-title">Merged Summaries</div>';
    for (const sm of mergedSm) {
      html += `<div class="summary-abstract-block summary-merged">
        <span class="summary-abstract-code summary-sm-code">${sm.code}</span>
        <div class="summary-abstract-content">${Utils.escapeHtml(sm.content).replace(/\n/g, '<br>')}</div>
      </div>`;
    }
  }

  // Unmerged abstracts
  const abstracts = getAbstracts();
  const lastMergedIdx = conversation.summary?.lastMergedIdx || 0;
  let mergedAbCount = 0;
  for (let i = 0; i < lastMergedIdx; i++) {
    if ((conversation.messages[i] || {}).role === 'assistant' && (conversation.messages[i] || {}).abstract) mergedAbCount++;
  }
  const unmerged = abstracts.slice(mergedAbCount);
  if (unmerged.length > 0) {
    html += `<div class="summary-abstracts-title">Unmerged Abstracts (${unmerged.length})</div>`;
    for (const ab of unmerged) {
      html += `<div class="summary-abstract-block">
        <span class="summary-abstract-code">${ab.code}</span>
        <div class="summary-abstract-content">${Utils.escapeHtml(ab.content).replace(/\n/g, '<br>')}</div>
      </div>`;
    }
  }

  if (!html) {
    html = `<div class="summary-empty">
      <div class="icon" style="width:32px;height:32px;display:block;margin:0 auto 12px;">${Icons.book}</div>
      暂无摘要<br><span style="font-size:11px;opacity:0.7;">AI 每次回复都会生成一条摘要</span>
    </div>`;
  }

  container.innerHTML = html;
}
